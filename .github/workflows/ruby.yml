name: Ruby
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - name: Set up Ruby
      uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
      with:
        ruby-version: '3.3'
        bundler-cache: true
    - name: Run unit tests + verifiers (prepush gate)
      run: bundle exec rake prepush
    - name: Run liquid-spec against reference adapter
      run: bundle exec rake run
    - name: Check feature tag coverage
      run: bundle exec rake coverage_check

  release:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    environment: release
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - name: Set up Ruby
      uses: ruby/setup-ruby@003a5c4d8d6321bd302e38f6f0ec593f77f06600 # v1.319.0
      with:
        ruby-version: '3.3'
        bundler-cache: true
    - name: Build gem
      run: bundle exec rake build
    - name: Publish to RubyGems
      run: |
        mkdir -p $HOME/.gem
        printf -- "---\n:rubygems_api_key: %s\n" "$RUBYGEMS_API_KEY" > $HOME/.gem/credentials
        chmod 0600 $HOME/.gem/credentials
        gem push build/liquid-spec-*.gem
      env:
        RUBYGEMS_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        generate_release_notes: true
        files: build/liquid-spec-*.gem
