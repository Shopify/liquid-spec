  hint: |
    ceil: input = Integer -> "5".
  template: "{{ x | ceil }}"
  environment:
    x: 5
  expected: "5"
- name: math_ceil_float
  complexity: 125
  hint: |
    ceil: input = Float -> "5".
  template: "{{ x | ceil }}"
  environment:
    x: 5.0
  expected: "5"
- name: math_ceil_numeric_str
  complexity: 125
  hint: |
    ceil: input = numeric String ('5') -> "5".
  template: "{{ x | ceil }}"
  environment:
    x: "5"
  expected: "5"
- name: math_ceil_nonnum_str
  complexity: 125
  hint: |
    ceil: input = non-numeric String ('foo') -> to_i = 0 -> "0".
  template: "{{ x | ceil }}"
  environment:
    x: "foo"
  expected: "0"
- name: math_ceil_nil
  complexity: 125
  hint: |
    ceil: input = nil -> coerced to 0 -> "0".
  template: "{{ x | ceil }}"
  environment:
    x: nil
  expected: "0"
- name: math_ceil_true
  complexity: 125
  hint: |
    ceil: input = true -> to_i = 0 (not 1!) -> "0".
  template: "{{ x | ceil }}"
  environment:
    x: true
  expected: "0"
- name: math_ceil_false
  complexity: 125
  hint: |
    ceil: input = false -> to_i = 0 -> "0".
  template: "{{ x | ceil }}"
  environment:
    x: false
  expected: "0"
- name: math_ceil_empty_str
  complexity: 125
  hint: |
    ceil: input = empty String -> to_i = 0 -> "0".
  template: "{{ x | ceil }}"
  environment:
    x: ""
  expected: "0"
- name: math_ceil_array
  complexity: 125
  hint: |
    ceil: input = Array -> to_i = 0 -> "0".
  template: "{{ x | ceil }}"
  environment:
    x: [1, 2, 3]
  expected: "0"
