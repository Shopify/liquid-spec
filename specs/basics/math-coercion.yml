- name: math_round_precision_0
  complexity: 145
  hint: |
    round: positive precision rounds to N decimals. Input 1.234, precision 2 -> "1.23".
  template: "{{ x | round: 2 }}"
  environment:
    x: 1.234
  expected: "1.23"
- name: math_round_precision_1
  complexity: 145
  hint: |
    round: precision 1. Input 1.234, precision 1 -> "1.2".
  template: "{{ x | round: 1 }}"
  environment:
    x: 1.234
  expected: "1.2"
- name: math_round_precision_2
  complexity: 145
  hint: |
    round: precision 0 rounds to integer. Input 1.234, precision 0 -> "1".
  template: "{{ x | round: 0 }}"
  environment:
    x: 1.234
  expected: "1"
- name: math_round_precision_3
  complexity: 145
  hint: |
    round: no precision arg == precision 0. Input 1.234, precision nil -> "1".
  template: "{{ x | round }}"
  environment:
    x: 1.234
  expected: "1"
- name: math_round_precision_4
  complexity: 145
  hint: |
    round: 0.5 rounds up to 2 (half-up). Input 1.5, precision nil -> "2".
  template: "{{ x | round }}"
  environment:
    x: 1.5
  expected: "2"
- name: math_round_precision_5
  complexity: 145
  hint: |
    round: -1.5 rounds to -2. Input -1.5, precision nil -> "-2".
  template: "{{ x | round }}"
  environment:
    x: -1.5
  expected: "-2"
- name: math_round_precision_6
  complexity: 145
  hint: |
    round: negative precision rounds to tens -> 0. Input 1.234, precision -1 -> "0".
  template: "{{ x | round: -1 }}"
  environment:
    x: 1.234
  expected: "0"
- name: math_round_precision_7
  complexity: 145
  hint: |
    round: 15 with precision -1 -> 20 (rounds to nearest 10). Input 15.0, precision -1 -> "20".
  template: "{{ x | round: -1 }}"
  environment:
    x: 15.0
  expected: "20"
- name: math_round_precision_8
  complexity: 145
  hint: |
    round: 14 with precision -1 -> 10. Input 14.0, precision -1 -> "10".
  template: "{{ x | round: -1 }}"
  environment:
    x: 14.0
  expected: "10"
- name: math_round_precision_9
  complexity: 145
  hint: |
    round: integer input with precision -> stays integer 5. Input 5, precision 2 -> "5".
  template: "{{ x | round: 2 }}"
  environment:
    x: 5
  expected: "5"
- name: math_round_precision_10
  complexity: 145
  hint: |
    round: zero rounds to 0. Input 0, precision nil -> "0".
  template: "{{ x | round }}"
  environment:
    x: 0
  expected: "0"
- name: math_round_precision_11
  complexity: 145
  hint: |
    round: non-numeric string round -> 0 (to_i = 0). Input "foo", precision nil -> "0".
  template: "{{ x | round }}"
  environment:
    x: "foo"
  expected: "0"
- name: math_float_repr_0
  complexity: 150
  hint: |
    Float result formatting: 10.0 / 3 -> long float repr -> "3.3333333333333335". (Ruby Float#to_s.)
  template: "{{ x | divided_by: 3 }}"
  environment:
    x: 10.0
  expected: "3.3333333333333335"
- name: math_float_repr_1
  complexity: 150
  hint: |
    Float result formatting: 1.0 / 3 -> "0.3333333333333333". (Ruby Float#to_s.)
  template: "{{ x | divided_by: 3 }}"
  environment:
    x: 1.0
  expected: "0.3333333333333333"
- name: math_float_repr_2
  complexity: 150
