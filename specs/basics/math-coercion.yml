- name: math_modulo_0
  complexity: 140
  hint: |
    modulo: 5 % 3 = 2 -> "2".
  template: "{{ x | modulo: 3 }}"
  environment:
    x: 5
  expected: "2"
- name: math_modulo_1
  complexity: 140
  hint: |
    modulo: -5 % 3 (Ruby modulo follows divisor sign) -> "1".
  template: "{{ x | modulo: 3 }}"
  environment:
    x: -5
  expected: "1"
- name: math_modulo_2
  complexity: 140
  hint: |
    modulo: 5 % -3 -> "-1".
  template: "{{ x | modulo: -3 }}"
  environment:
    x: 5
  expected: "-1"
- name: math_modulo_3
  complexity: 140
  hint: |
    modulo: 6 % 3 = 0 (exact) -> "0".
  template: "{{ x | modulo: 3 }}"
  environment:
    x: 6
  expected: "0"
- name: math_modulo_4
  complexity: 140
  hint: |
    modulo: 5 % 1 = 0 -> "0".
  template: "{{ x | modulo: 1 }}"
  environment:
    x: 5
  expected: "0"
- name: math_modulo_5
  complexity: 140
  hint: |
    modulo: 0 % 3 = 0 -> "0".
  template: "{{ x | modulo: 3 }}"
  environment:
    x: 0
  expected: "0"
