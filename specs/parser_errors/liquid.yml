---
- name: liquid-200
  template: |-
    {% liquid
    hello world
    %}
  errors:
    parse_error:
    - 'Liquid syntax error: Unknown tag ''hello'''
  complexity: 100
- name: liquid-201
  template: |-
    {% liquid
    foobar baz
    %}
  errors:
    parse_error:
    - 'Liquid syntax error: Unknown tag ''foobar'''
  complexity: 100
- name: liquid-203
  template: |-
    {% liquid
    endfor
    %}
  errors:
    parse_error:
    - 'Liquid syntax error: ''endfor'' is not a valid delimiter for liquid tags. use
      %}'
  complexity: 100
- name: liquid-204
  template: |-
    {% liquid
    assign
    %}
  errors:
    parse_error:
    - 'Liquid syntax error: Syntax Error in ''assign'' - Valid syntax: assign [var]
      = [source] in ""'
  complexity: 100
- name: liquid-205
  template: |-
    {% liquid
    assign x = 1
    assign
    %}
  errors:
    parse_error:
    - 'Liquid syntax error: Syntax Error in ''assign'' - Valid syntax: assign [var]
      = [source] in ""'
  complexity: 100
- name: liquid-207
  template: |-
    {% liquid
    for i
    %}
  errors:
    parse_error:
    - 'Liquid syntax error: For loops require an ''in'' clause in "i"'
  complexity: 100
- name: liquid-208
  template: |-
    {% liquid
    for i in (1..3)
    echo i
    %}
  errors:
    parse_error:
    - 'Liquid syntax error: ''for'' tag was never closed'
  complexity: 100
