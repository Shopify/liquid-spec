- name: sec_wide_open_object_name_raises_no_to_liquid
  features: [ruby_drops]
  template: "{{ o.name }}"
  environment:
    o:
      instantiate:WideOpenObject: {}
  errors:
    render_error:
    - NoMethodError
    - to_liquid
  complexity: 220
  hint: |
    A plain (non-Drop) object is not treated as a drop. Even though `name` is a
    public method, Liquid does not invoke it; property access raises a
    NoMethodError because the object has no `to_liquid` method.

