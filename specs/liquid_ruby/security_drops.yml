  complexity: 190

- name: sec_array_class_not_accessible
  template: "{{ a.class }}"
  environment:
    a: [1, 2, 3]
  expected: ""
  complexity: 200
  hint: "Array#class is not exposed; 'Array' must not appear."

- name: sec_string_allows_size
  template: "{{ s.size }}"
  environment:
    s: hello
  expected: "5"
  complexity: 190

- name: sec_string_allows_first
  template: "{{ s.first }}"
