  features: [ruby_drops]
  template: "{{ d | size }}"
  environment:
    d:
      instantiate:SecurityVictimDrop: {}
  expected: "0"
  complexity: 220
  hint: "QUIRK: size on a drop that has no size method/[] returns 0 (size of the drop's to_s? No - liquid-ruby returns 0 for a drop without size)."

# =============================================================================
# 7. Safe types (Hash, Array, String) - class never leaks
# =============================================================================

- name: sec_hash_allows_key_access
  template: "{{ h.name }}"
  environment:
    h:
      name: test
  expected: test
  complexity: 190

- name: sec_hash_allows_size
  template: "{{ h.size }}"
  environment:
    h:
      a: 1
      b: 2
  expected: "2"
  complexity: 190

- name: sec_hash_key_named_class_returns_value
  template: "{{ h.class }}"
  environment:
    h:
      class: my_class
  expected: my_class
  complexity: 200
  hint: "QUIRK: a Hash with a literal 'class' key returns the hash value for that key, NOT the Ruby class. Hash lookup takes precedence over Object#class."

- name: sec_hash_without_class_key_returns_empty
  template: "{{ h.class }}"
  environment:
    h:
      a: 1
  expected: ""
  complexity: 200
  hint: "A Hash without a 'class' key returns nil for h.class - the class name 'Hash' must NOT appear."

