# Security boundary specs for Liquid::Drop and the to_liquid protocol.
#
# These verify that the reference Shopify/liquid engine gates property access:
#   * Liquid::Drop subclasses only expose explicitly defined methods. Every
#     Object/Kernel method (class, send, instance_eval, inspect, methods,
#     object_id, ...) is blocked and renders as empty.
#   * Instance variables never leak unless an accessor method exposes them.
#   * Bracket access (d[k]) is subject to the same whitelist as dot access.
#   * The boundary holds across property chains, inside conditionals/loops,
#     through assign/capture, and through filter chains.
#   * Plain (non-Drop) objects are NOT treated as drops: property access raises
#     a NoMethodError on to_liquid (a render error, matched on "to_liquid").
#   * Objects implementing #to_liquid expose only what to_liquid returns; the
#     original object's methods are unreachable afterwards.
#
# Imported from the liquid-il security test suite, normalised to match the
# reference Shopify/liquid (5.x) behaviour.
---
_metadata:
  hint: |
    These specs verify the Drop security boundary. A Liquid::Drop only exposes
    explicitly defined subclass methods; dangerous Object/Kernel methods
    (class, send, instance_eval, inspect, methods, object_id, ...) return nil
    and render as empty. Instance variables never leak unless an accessor
    method exposes them. Plain (non-Drop) objects raise a NoMethodError on
    to_liquid when any property is accessed.
  minimum_complexity: 180
  features:
  - ruby_drops

specs:

# =============================================================================
# 1. Dangerous Object/Kernel methods are blocked on drops (dot access)
# =============================================================================

- name: sec_drop_blocks_class
  features: [ruby_drops]
  template: "{{ d.class }}"
  environment:
    d:
      instantiate:SecurityVictimDrop: {}
  expected: ""
  complexity: 180
  hint: |
    Liquid::Drop#invoke_drop only allows methods defined on the subclass.
    `class` is an Object method, not a drop method, so d.class returns nil.

