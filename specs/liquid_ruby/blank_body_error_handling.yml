---
# Blank-body render-error handling — the full contract, so that no
# implementation can leave this undefined.
#
# THE RULE: a block tag (if/unless/case/for/tablerow) whose ENTIRE body — every
# branch — is blank (whitespace-only text, comments, assigns, captures, nested
# blank blocks) suppresses the TEXT of any render error raised while evaluating
# it. The condition/collection IS evaluated: the error is recorded on the
# template (template.errors) and strict rendering (render!) still raises.
# Only the inline "Liquid error (...)" output text is suppressed. Output
# variables ({{ ... }}, {% echo %}) are never blank, so their errors always
# print.
#
# MODE MATRIX:
# - lax inline-error mode preserves the historical blank-body suppression.
# - strict inline-error mode also preserves that historical suppression for
#   backwards compatibility.
# - strict2 is the new behavior: blank bodies must NOT suppress inline error
#   text. If an error is evaluated, strict2 should make it visible.
# - raised-error mode is separate from inline-error output. With raised errors
#   enabled, all modes raise; blank-body suppression only controls rendered
#   inline error TEXT.
#
# Lax/strict expectations were validated against current reference liquid.
# Strict2 expectations intentionally define the new desired behavior.

specs:

# ── The lax rule ────────────────────────────────────────────────────────────

- name: blank_if_body_suppresses_error_text_lax
  template: "{% if 5 > \"x\" %}{% endif %}"
  error_mode: :lax
  render_errors: true
  expected: ""
  complexity: 700
  hint: |
    In lax mode an if whose body is empty is a blank tag: the condition is
    still evaluated and `5 > "x"` still raises a comparison error (strict
    rendering raises; the error is recorded on the template), but the
    "Liquid error (...)" text is NOT written to the output. Backwards-
    compatibility behavior: an erroring condition on an invisible tag stays
    invisible.

- name: blank_unless_body_suppresses_error_text_lax
  template: "{% unless 5 > \"x\" %} {% endunless %}"
  error_mode: :lax
  render_errors: true
  expected: ""
  complexity: 700
  hint: |
    Whitespace-only bodies are blank. The unless condition errors, the error
    is recorded, and nothing — neither body nor error text — reaches the
    output in lax mode.

- name: blank_for_body_suppresses_error_text_lax
  template: "{% for i in (1..3) offset: xs %}{% endfor %}"
  environment:
    xs: "bad"
  error_mode: :lax
  render_errors: true
  expected: ""
  complexity: 700
  hint: |
    The rule covers every block tag, not just conditionals: a for loop whose
    body is blank suppresses its render-error text too. Here the non-numeric
    offset raises "invalid integer", which is recorded but not printed. With
    any visible body content the same template prints
    "Liquid error (line 1): invalid integer".

- name: nonblank_for_body_shows_error_text_lax
  template: "{% for i in (1..3) offset: xs %}{{ i }}{% endfor %}"
  environment:
    xs: "bad"
  error_mode: :lax
  render_errors: true
  expected: "Liquid error (line 1): invalid integer"
  complexity: 700
  hint: |
    The counterpart: one output variable in the body makes the for loop
    non-blank, and the identical offset error now renders its text.

# ── What counts as blank ────────────────────────────────────────────────────

- name: assign_body_is_blank_lax
  template: "{% if 5 > \"x\" %}{% assign a = 1 %}{% endif %}"
  error_mode: :lax
  render_errors: true
  expected: ""
  complexity: 700
  hint: |
    {% assign %} produces no output and counts as blank, so a body containing
    only assigns is a blank body: the error text is suppressed. Blankness is
    about visible output, not about emptiness.

- name: comment_body_is_blank_lax
  template: "{% if 5 > \"x\" %}{% comment %}c{% endcomment %}{% endif %}"
  error_mode: :lax
  render_errors: true
  expected: ""
  complexity: 700
  hint: |
    Comments are blank. A body of comments (or captures, or whitespace, or
    nested blocks that are themselves blank) keeps the tag blank.

- name: capture_body_is_blank_lax
  template: "{% if 5 > \"x\" %}{% capture c %}text{% endcapture %}{% endif %}"
  error_mode: :lax
  render_errors: true
  expected: ""
  complexity: 700
  hint: |
    {% capture %} writes to a variable, not to the output, so it is blank —
    even though its inner body contains visible text.

- name: echo_body_is_not_blank_lax
  template: "{% if 5 > \"x\" %}{% echo 1 %}{% endif %}"
  error_mode: :lax
  render_errors: true
  expected: "Liquid error (line 1): comparison of Integer with String failed"
  complexity: 700
  hint: |
    {% echo %} produces output, so the body is not blank and the error text
    renders. Output variables are never blank.

- name: empty_output_body_is_not_blank_lax
  template: "{% if 5 > \"x\" %}{{ \"\" }}{% endif %}"
  error_mode: :lax
  render_errors: true
  expected: "Liquid error (line 1): comparison of Integer with String failed"
  complexity: 700
  hint: |
    Blankness is decided at parse time by node KIND, not by what the node
    would render: {{ "" }} renders nothing, but an output variable is never
    blank, so the tag is non-blank and the error text appears.

- name: nonblank_else_branch_makes_tag_nonblank_lax
  template: "{% if 5 > \"x\" %}{% else %}E{% endif %}"
  error_mode: :lax
  render_errors: true
  expected: "Liquid error (line 1): comparison of Integer with String failed"
  complexity: 700
  hint: |
    EVERY branch counts: a visible else body makes the whole if non-blank,
    so the condition's error text renders (and neither branch body does).

# ── Evaluation still happens ────────────────────────────────────────────────

- name: blank_body_condition_still_evaluated_lax
  template: "{% if 1 < 2 %}{% assign a = 7 %}{% endif %}{{ a }}"
  error_mode: :lax
  expected: "7"
  complexity: 700
  hint: |
    Blank tags are not skipped — they render invisibly. A true condition
    still executes the (blank) body, so the assign takes effect. Only the
    ERROR TEXT of a blank tag is suppressed; evaluation and side effects are
    unchanged.

# ── Strict mode: historical inline-error suppression remains ────────────────

- name: blank_if_body_suppresses_error_text_strict
  template: "{% if 5 > \"x\" %}{% endif %}"
  error_mode: :strict
  render_errors: true
  expected: ""
  complexity: 750
  hint: |
    QUIRK: strict mode still preserves the historical inline-error text
    suppression for blank block bodies. The condition is evaluated and the
    error is recorded/raised in raised-error mode, but render_errors/inline
    output stays empty for compatibility.

- name: blank_unless_body_suppresses_error_text_strict
  template: "{% unless 5 > \"x\" %} {% endunless %}"
  error_mode: :strict
  render_errors: true
  expected: ""
  complexity: 750
  hint: |
    Whitespace-only unless bodies are blank in strict mode too. This documents
    the compatibility behavior that strict2 intentionally changes.

- name: blank_for_body_suppresses_error_text_strict
  template: "{% for i in (1..3) offset: xs %}{% endfor %}"
  environment:
    xs: "bad"
  error_mode: :strict
  render_errors: true
  expected: ""
  complexity: 750
  hint: |
    QUIRK: strict-mode inline-error suppression applies to blank for bodies.
    The invalid offset is evaluated, but because the body is blank the inline
    "Liquid error (...)" text is not written to output.

# ── strict2: blank bodies must not suppress inline errors ───────────────────

- name: blank_if_body_shows_error_text_strict2
  template: "{% if 5 > \"x\" %}{% endif %}"
  error_mode: strict2
  render_errors: true
  expected: "Liquid error (line 1): comparison of Integer with String failed"
  complexity: 750
  hint: |
    NEW STRICT2 CONTRACT: strict2 stops the historical blank-body suppression.
    The body is blank, but the condition still errors, so inline-error output
    must include the "Liquid error (...)" text.

- name: whitespace_if_body_shows_error_text_strict2
  template: "{% if 5 > \"x\" %}   {% endif %}"
  error_mode: strict2
  render_errors: true
  expected: "Liquid error (line 1): comparison of Integer with String failed"
  complexity: 750
  hint: |
    NEW STRICT2 CONTRACT: whitespace-only text is blank for lax/strict
    compatibility, but strict2 must not hide the condition error text.

- name: assign_if_body_shows_error_text_strict2
  template: "{% if 5 > \"x\" %}{% assign a = 1 %}{% endif %}"
  error_mode: strict2
  render_errors: true
  expected: "Liquid error (line 1): comparison of Integer with String failed"
  complexity: 750
  hint: |
    NEW STRICT2 CONTRACT: assign nodes produce no output and used to make the
    body blank enough to suppress inline errors. strict2 should surface the
    error text anyway.

- name: comment_if_body_shows_error_text_strict2
  template: "{% if 5 > \"x\" %}{% comment %}c{% endcomment %}{% endif %}"
  error_mode: strict2
  render_errors: true
  expected: "Liquid error (line 1): comparison of Integer with String failed"
  complexity: 750
  hint: |
    NEW STRICT2 CONTRACT: comments are blank output, but strict2 should not use
    blankness as a reason to hide an erroring condition.

- name: capture_if_body_shows_error_text_strict2
  template: "{% if 5 > \"x\" %}{% capture c %}text{% endcapture %}{% endif %}"
  error_mode: strict2
  render_errors: true
  expected: "Liquid error (line 1): comparison of Integer with String failed"
  complexity: 750
  hint: |
    NEW STRICT2 CONTRACT: capture writes to a variable, not output. That made
    it blank for historical suppression, but strict2 should still render the
    condition error text.

- name: blank_unless_body_shows_error_text_strict2
  template: "{% unless 5 > \"x\" %} {% endunless %}"
  error_mode: strict2
  render_errors: true
  expected: "Liquid error (line 1): comparison of Integer with String failed"
  complexity: 750
  hint: |
    NEW STRICT2 CONTRACT: unless follows if. A blank unless body does not hide
    the error text from evaluating its condition.

- name: blank_for_body_shows_error_text_strict2
  template: "{% for i in (1..3) offset: xs %}{% endfor %}"
  environment:
    xs: "bad"
  error_mode: strict2
  render_errors: true
  expected: "Liquid error (line 1): invalid integer"
  complexity: 750
  hint: |
    NEW STRICT2 CONTRACT: for follows the same rule. A blank body should not
    hide an invalid offset error in strict2.

# ── Raised-error mode: blankness never swallows the exception ───────────────

- name: blank_if_body_raises_error_lax
  template: "{% if 5 > \"x\" %}{% endif %}"
  error_mode: :lax
  errors:
    render_error:
      - comparison of Integer with String failed
  complexity: 750
  hint: |
    Blank-body suppression only affects inline rendered error TEXT. With raised
    errors enabled, the evaluated condition raises even in lax mode.

- name: blank_if_body_raises_error_strict
  template: "{% if 5 > \"x\" %}{% endif %}"
  error_mode: :strict
  errors:
    render_error:
      - comparison of Integer with String failed
  complexity: 750
  hint: |
    Strict raised-error mode raises the condition error. There is no output
    suppression path because rendering aborts with the exception.

- name: blank_if_body_raises_error_strict2
  template: "{% if 5 > \"x\" %}{% endif %}"
  error_mode: strict2
  errors:
    render_error:
      - comparison of Integer with String failed
  complexity: 750
  hint: |
    strict2 also raises when strict_errors are enabled. The strict2 inline
    behavior differs from lax/strict, but raised-error behavior is the same:
    evaluated errors raise.

- name: blank_for_body_raises_error_lax
  template: "{% for i in (1..3) offset: xs %}{% endfor %}"
  environment:
    xs: "bad"
  error_mode: :lax
  errors:
    render_error:
      - invalid integer
  complexity: 750
  hint: |
    The invalid offset is evaluated before the loop body. Inline lax mode may
    hide the rendered text for blank bodies, but raised-error mode still raises.

- name: blank_for_body_raises_error_strict
  template: "{% for i in (1..3) offset: xs %}{% endfor %}"
  environment:
    xs: "bad"
  error_mode: :strict
  errors:
    render_error:
      - invalid integer
  complexity: 750
  hint: |
    Strict raised-error mode raises the invalid offset even though the body is
    blank.

- name: blank_for_body_raises_error_strict2
  template: "{% for i in (1..3) offset: xs %}{% endfor %}"
  environment:
    xs: "bad"
  error_mode: strict2
  errors:
    render_error:
      - invalid integer
  complexity: 750
  hint: |
    strict2 raised-error mode raises the invalid offset. The strict2 contract
    also surfaces this error in inline-error mode.
