---
# Specs for bare-bracket rejection in strict2 and the `self` keyword.
#
# In strict2 mode, bare-bracket variable access (e.g. {{ ['product'] }})
# is rejected. The `self` keyword provides an explicit way to perform
# dynamic variable lookups: {{ self[key] }}.
#
# `self` resolves to a SelfDrop that walks the normal variable scope
# chain (local > file > global) without exposing context internals.

- name: strict2_rejects_bare_bracket_string_variable
  template: "{{ ['product'] }}"
  error_mode: strict2
  errors:
    parse_error:
      - "Bare bracket access is not allowed"
  hint: |
    In strict2 mode, bare-bracket access like ['product'] is rejected.
    The parser should raise a SyntaxError when it encounters an open
    square bracket at the start of an expression.

- name: strict2_rejects_bare_bracket_double_quoted
  template: '{{ ["product"] }}'
  error_mode: strict2
  errors:
    parse_error:
      - "Bare bracket access is not allowed"
  hint: |
    Double-quoted bare-bracket access is also rejected in strict2 mode.

- name: strict2_rejects_bare_bracket_dynamic_lookup
  template: "{{ [key] }}"
  error_mode: strict2
  errors:
    parse_error:
      - "Bare bracket access is not allowed"
  hint: |
    Dynamic variable lookup via bare brackets is rejected in strict2 mode.
    Use self[key] instead.

- name: strict2_rejects_bare_bracket_in_for
  template: "{% for item in ['collection'] %}{{ item }}{% endfor %}"
  error_mode: strict2
  errors:
    parse_error:
      - "Bare bracket access is not allowed"
  hint: |
    Bare brackets in for loop collections are rejected in strict2 mode.

- name: strict2_rejects_bare_bracket_in_if
  template: "{% if ['product'] == true %}hello{% endif %}"
  error_mode: strict2
  errors:
    parse_error:
      - "Bare bracket access is not allowed"
  hint: |
    Bare brackets in if conditions are rejected in strict2 mode.

- name: strict2_rejects_bare_bracket_in_case
  template: "{% case ['product'] %}{% when 'a' %}hello{% endcase %}"
  error_mode: strict2
  errors:
    parse_error:
      - "Bare bracket access is not allowed"
  hint: |
    Bare brackets in case expressions are rejected in strict2 mode.

- name: strict2_rejects_bare_bracket_in_assign
  template: "{% assign x = ['product'] %}"
  error_mode: strict2
  errors:
    parse_error:
      - "Bare bracket access is not allowed"
  hint: |
    Bare brackets in assign values are rejected in strict2 mode.

- name: strict2_accepts_qualified_bracket_access
  template: "{{ product['title'] }}"
  environment:
    product:
      title: Cool
  error_mode: strict2
  expected: "Cool"
  hint: |
    Bracket notation on a named variable (product['title']) is still
    valid in strict2 mode. Only bare brackets at the start of an
    expression are rejected.

- name: strict2_accepts_dot_notation
  template: "{{ product.title }}"
  environment:
    product:
      title: Cool
  error_mode: strict2
  expected: "Cool"
  hint: |
    Dot notation is always valid in strict2 mode.

- name: self_bracket_access_resolves_variable
  template: "{{ self['product'] }}"
  environment:
    product: shoes
  expected: "shoes"
  hint: |
    self['product'] resolves the variable 'product' through the normal
    scope chain. The `self` keyword returns a SelfDrop that provides
    variable-only access to the current context.

- name: self_bracket_access_strict2
  template: "{{ self['product'] }}"
  environment:
    product: shoes
  error_mode: strict2
  expected: "shoes"
  hint: |
    self['product'] is valid in strict2 mode - it's the replacement
    for bare-bracket access like ['product'].

- name: self_dynamic_lookup
  template: "{{ self[key] }}"
  environment:
    key: target
    target: found it
  expected: "found it"
  hint: |
    self[key] performs a dynamic variable lookup: first resolves 'key'
    to get 'target', then looks up 'target' in the scope chain.

- name: self_dynamic_lookup_strict2
  template: "{{ self[key] }}"
  environment:
    key: target
    target: found it
  error_mode: strict2
  expected: "found it"
  hint: |
    self[key] is the strict2-compatible way to do dynamic lookups.
    In lax mode, [key] works but is rejected in strict2.

- name: self_dynamic_lookup_with_assigned_key
  template: "{% assign key = 'greeting' %}{{ self[key] }}"
  environment:
    greeting: hello
  expected: "hello"
  hint: |
    The dynamic key passed to self[...] can come from a local assign,
    not just from the environment. self[key] reads 'key' from the
    local scope and uses its value to look up 'greeting'.

- name: self_sees_local_assigns
  template: "{% assign product = 'local' %}{{ self['product'] }}"
  environment:
    product: global
  expected: "local"
  hint: |
    self walks the normal scope chain (local > file > global).
    A local assign shadows the global variable, and self['product']
    returns the local value.

- name: self_can_be_assigned
  template: "{% assign self = 'hello' %}{{ self }}"
  expected: "hello"
  hint: |
    If 'self' is explicitly assigned as a local variable, the local
    value takes precedence over the SelfDrop. This allows templates
    that already use 'self' as a variable name to continue working.

- name: self_returns_empty_for_unknown_keys
  template: "{{ self['nonexistent'] }}"
  environment:
    product: shoes
  expected: ""
  hint: |
    self['nonexistent'] returns nil (rendered as empty string) when
    the key doesn't exist in any scope.

- name: self_returns_empty_for_unknown_keys_strict2
  template: "{{ self['nonexistent'] }}"
  error_mode: strict2
  expected: ""
  hint: |
    In strict2 mode, self['nonexistent'] still renders as an empty
    string for missing keys (it returns nil, not an error). Strict2
    rejects bare brackets at parse time, but self[...] is a normal
    drop access at runtime and follows the usual missing-variable
    rendering behavior.

- name: self_nested_property_access
  template: "{{ self['product'].title }}"
  environment:
    product:
      title: Shoes
  expected: "Shoes"
  hint: |
    After resolving self['product'] to the product hash, further
    property access (.title) works as expected.

- name: self_bracket_in_bracket_recursion
  template: "{{ a[ self[ 'b' ] ] }}"
  environment:
    b: c
    a:
      c: result
  expected: "result"
  hint: |
    self[...] can appear inside another bracket expression. Here
    self['b'] resolves to 'c', which is then used as the key into
    the 'a' hash, yielding 'result'. Nested resolution should work
    naturally because self[...] is just another expression.

- name: self_recursive_lookup
  template: "{{ self[self['key1']] }}"
  environment:
    key1: key2
    key2: value
  expected: "value"
  hint: |
    self[...] can be nested inside itself. The inner self['key1']
    resolves to 'key2', then the outer self[...] looks up 'key2'
    in the scope chain and returns 'value'.

- name: self_contains_present_key
  template: "{% if self contains 'greeting' %}yes{% else %}no{% endif %}"
  environment:
    greeting: hello
  expected: "no"
  hint: |
    QUIRK: `self contains 'key'` always renders the false branch,
    even when the key exists. The `contains` operator calls
    include? on its left operand, and SelfDrop does not implement
    include?, so the operator falls through to false. Use
    self['key'] and check the result instead, or rely on
    {% if self['key'] %} for truthiness.

- name: self_contains_absent_key
  template: "{% if self contains 'absent' %}yes{% else %}no{% endif %}"
  expected: "no"
  hint: |
    `self contains 'key'` returns false when the key is not defined.
    Note that this matches the present-key behavior - `contains`
    does not work on SelfDrop because Drop does not implement
    include?.

- name: self_contains_nil_valued_key
  template: "{% if self contains 'maybe' %}yes{% else %}no{% endif %}"
  environment:
    maybe: null
  expected: "no"
  hint: |
    `self contains 'key'` returns false even for keys with explicit
    nil values, because `contains` doesn't work on SelfDrop at all
    (Drop doesn't implement include?). The `contains` operator is
    not the right way to test variable definedness through self.

- name: self_inside_for_loop_body
  template: "{% for item in items %}{{ self[item] }}{% endfor %}"
  environment:
    items:
      - a
      - b
    a: "1"
    b: "2"
  expected: "12"
  hint: |
    self[...] works inside loop bodies. Each iteration of the for
    loop looks up the current `item` value through self, walking
    the normal scope chain to find variables `a` and `b`.

- name: self_inside_capture_body
  template: "{% capture x %}{{ self['k'] }}{% endcapture %}{{ x }}"
  environment:
    k: v
  expected: "v"
  hint: |
    self[...] works inside capture blocks. The captured value is
    rendered using the same variable lookup rules as anywhere else.

- name: self_environment_key_shadows_self_drop
  template: "{{ self }}"
  environment:
    self: env_value
  expected: "env_value"
  hint: |
    A static environment variable named `self` shadows the synthetic
    SelfDrop. Bare `self` only falls back to SelfDrop after normal
    scope and environment lookup miss.

- name: self_dotted_special_names_delegate_to_scope
  template: "{% assign size = 17 %}{% assign first = 18 %}{% assign last = 19 %}{{ self.size }}|{{ self.first }}|{{ self.last }}"
  expected: "17|18|19"
  hint: |
    The dotted names size, first, and last are usually special drop
    dispatch paths, but SelfDrop delegates them through normal variable
    lookup. A local variable with one of those names should be returned
    instead of a built-in SelfDrop property.

- name: assigned_self_compares_equal_to_itself
  template: "{% assign s = self %}{% if s == s %}true{% else %}false{% endif %}"
  expected: "true"
  hint: |
    Assigning self stores one SelfDrop object. Comparing that assigned
    object to itself is true because both sides are the same object.

- name: bare_self_compares_equal_to_bare_self
  template: "{% if self == self %}true{% else %}false{% endif %}"
  expected: "true"
  hint: |
    Each bare self lookup creates a distinct SelfDrop object, but both
    objects point at the same variable context. SelfDrop equality follows
    that shared context.

- name: distinct_self_assignments_compare_equal
  template: "{% assign a = self %}{% assign b = self %}{% if a == b %}true{% else %}false{% endif %}"
  expected: "true"
  hint: |
    Separate assignments from separate self lookups store distinct
    SelfDrop objects. They compare equal because both point at the same
    variable context.

- name: self_environment_key_is_bracket_receiver
  template: "{{ self['key'] }}|{{ self.key }}"
  environment:
    self:
      key: value
  expected: "value|value"
  hint: |
    When an environment defines `self`, bracket and dot access operate
    on that environment value. The synthetic SelfDrop is only used when
    the normal lookup chain doesn't find `self`.

- name: increment_self_shadows_self_drop
  template: "{% increment self %}|{{ self }}"
  expected: "0|1"
  hint: |
    Increment writes its counter into the environment. That environment
    value shadows the synthetic SelfDrop for later bare `self` lookups.

- name: decrement_self_shadows_self_drop
  template: "{% decrement self %}|{{ self }}"
  expected: "-1|-1"
  hint: |
    Decrement writes its counter into the environment. That environment
    value shadows the synthetic SelfDrop for later bare `self` lookups.

- name: self_in_render_without_passing_resolves_inner_scope
  template: "{%- assign var = 42 -%}{%- render 'snippet1' -%}"
  filesystem:
    snippet1: "{%- assign var = 99 -%}{{- self.var -}}"
  expected: "99"
  hint: |
    A fresh self lookup inside render uses the rendered snippet's
    scope. It does not implicitly capture the caller's local scope.

- name: self_passed_as_render_param_preserves_original_scope
  template: "{%- assign var = 42 -%}{%- assign s = self -%}{%- render 'snippet1', other_self: s -%}"
  filesystem:
    snippet1: "{%- assign var = 43 -%}{{- other_self.var }}|{{ self.var -}}"
  expected: "42|43"
  hint: |
    When a SelfDrop object is assigned and passed into render, that
    object keeps looking through the original context, while a fresh
    self lookup inside the snippet sees the snippet scope.

- name: self_passed_as_self_render_param_preserves_original_scope
  template: "{%- assign x = 1 -%}{%- render 'snippet1', self: self -%}"
  filesystem:
    snippet1: "{%- assign x = 2 -%}{{- self['x'] }}|{{ x -}}"
  expected: "1|2"
  hint: |
    Passing SelfDrop with the render parameter name `self` shadows the
    snippet's fresh self lookup and preserves the caller's original scope.

- name: self_passed_to_nested_renders_preserves_each_level
  template: "{%- assign a = 1 -%}{%- assign s1 = self -%}{%- render 'snippet1', outer: s1 -%}"
  filesystem:
    snippet1: "{%- assign a = 2 -%}{%- assign s2 = self -%}{%- render 'snippet2', outer: outer, middle: s2 -%}"
    snippet2: "{%- assign a = 3 -%}{{- outer.a }}|{{ middle.a }}|{{ self.a -}}"
  expected: "1|2|3"
  hint: |
    Captured SelfDrop objects preserve the context they came from
    across multiple render boundaries. A SelfDrop captured in the
    outer template sees the outer value, one captured in the middle
    snippet sees the middle value, and a fresh self lookup in the
    inner snippet sees the inner value.

- name: self_reflects_variables_assigned_after_creation
  template: "{%- assign s = self -%}{%- assign x = 42 %}{{ s.x -}}"
  expected: "42"
  hint: |
    SelfDrop is a live context proxy, not a snapshot. If a variable is
    assigned after self is captured, looking up that variable through
    the captured SelfDrop should see the later assignment.

- name: self_with_strict_variables_does_not_raise_for_defined_var
  template: "{{ self.x }}"
  environment:
    x: 42
  error_mode: strict2
  expected: "42"
  hint: |
    Strict variables still allow SelfDrop lookups for keys that are
    defined in the current context.

- name: self_with_strict_variables_returns_empty_for_undefined_var
  template: "{{ self.x }}"
  error_mode: strict2
  expected: ""
  hint: |
    Missing keys through SelfDrop return nil and render empty, even
    when strict variable handling is enabled.

- name: self_can_be_passed_as_bare_drop_to_render
  template: "{%- assign x = 42 -%}{%- assign s = self -%}{%- render 'snippet1', drop: s -%}"
  filesystem:
    snippet1: "{{- drop.x -}}"
  expected: "42"
  hint: |
    Passing SelfDrop with the generic render parameter name `drop`
    still preserves the captured context and supports normal lookup.

- name: captured_environment_self_preserves_environment_value_across_render
  template: "{%- assign s = self -%}{%- render 'snippet1', drop: s -%}"
  environment:
    self:
      value: env
  filesystem:
    snippet1: "{{- drop.value -}}"
  expected: "env"
  hint: |
    If the environment defines `self`, assigning `self` captures that
    environment value rather than the synthetic SelfDrop. Passing it
    through render preserves the captured value as usual.

- name: self_size_filter_has_no_intrinsic_size
  template: "{% assign size = 'SSS' %}{{ self.size }}|{{ self['size'] }}|{{ self | size }}"
  expected: "SSS|SSS|0"
  hint: |
    SelfDrop delegates size lookups through the scope, but the size
    filter sees the SelfDrop object itself. SelfDrop has no intrinsic
    size, so the filter returns 0.

- name: first_filter_returns_empty_for_self_with_first_key
  template: "{% assign first = 'FIRST' %}{{ self | first }}|{{ self['first'] }}"
  expected: "|FIRST"
  hint: |
    SelfDrop delegates bracket lookups through the scope, but the first
    filter sees the SelfDrop object itself. SelfDrop has no intrinsic
    first value, so the filter returns nil even when a variable named
    first exists.

- name: last_filter_returns_empty_for_self_with_last_key
  template: "{% assign last = 'LAST' %}{{ self | last }}|{{ self['last'] }}"
  expected: "|LAST"
  hint: |
    SelfDrop delegates bracket lookups through the scope, but the last
    filter sees the SelfDrop object itself. SelfDrop has no intrinsic
    last value, so the filter returns nil even when a variable named
    last exists.

- name: map_filter_looks_up_self_drop_properties
  template: "{% assign x = 'X' %}{{ self | map: 'x' | join: ',' }}|{{ self | map: 'missing' | join: ',' }}"
  expected: "X|"
  hint: |
    SelfDrop is iterable as one item for collection filters. Property
    filters such as map should use normal SelfDrop lookup for each key.

- name: escape_filter_stringifies_self_drop
  template: "{{ self | escape }}"
  expected: "Liquid::SelfDrop"
  hint: |
    String-oriented filters stringify SelfDrop through Liquid::Drop#to_s.

- name: slice_filter_stringifies_self_drop
  template: "{{ self | slice: 0, 6 }}|{{ self | slice: 8, 4 }}"
  expected: "Liquid|Self"
  hint: |
    Slice works on SelfDrop after stringifying it to Liquid::SelfDrop.

- name: truncate_filter_stringifies_self_drop
  template: "{{ self | truncate: 9 }}|{% assign suffix = self %}{{ 'abcdef' | truncate: 5, suffix }}"
  expected: "Liquid...|Liquid::SelfDrop"
  hint: |
    Truncate stringifies SelfDrop both as input and as a custom suffix.

- name: truncatewords_filter_stringifies_self_drop
  template: "{{ self | truncatewords: 1 }}|{% assign suffix = self %}{{ 'alpha beta gamma' | truncatewords: 1, suffix }}"
  expected: "Liquid::SelfDrop|alphaLiquid::SelfDrop"
  hint: |
    Truncatewords stringifies SelfDrop both as input and as a custom
    suffix.

- name: url_encode_filter_stringifies_self_drop
  template: "{{ self | url_encode }}"
  expected: "Liquid%3A%3ASelfDrop"
  hint: |
    URL encoding first stringifies SelfDrop to Liquid::SelfDrop, then
    percent-encodes the class-name string.

- name: lax_allows_bare_bracket_access
  template: "{{ ['product'] }}"
  environment:
    product: shoes
  error_mode: :lax
  expected: "shoes"
  hint: |
    Bare-bracket access is still allowed in lax mode for backwards
    compatibility. Only strict2 mode rejects it.
