# ═══════════════════════════════════════════════════════════════════════════════
# BENCHMARK: Cart Page (filter chains, math, capture)
# ═══════════════════════════════════════════════════════════════════════════════

- name: bench_storefront_cart_page
  template: |
    {%- comment -%}Shopping cart — heavy math and filter chain usage{%- endcomment -%}
    <!DOCTYPE html>
    <html>
    <head><title>Your Cart — {{ shop.name }}</title></head>
    <body>
      {% render 'header', shop: shop, navigation: navigation, cart_count: cart.item_count %}

      <main class="cart-page">
        <h1>Your Cart</h1>

        {% if cart.items.size > 0 %}
          <table class="cart-table">
            <thead>
              <tr>
                <th>Product</th>
                <th>Price</th>
                <th>Quantity</th>
                <th>Total</th>
              </tr>
            </thead>
            <tbody>
              {% assign subtotal = 0 %}
              {% for item in cart.items %}
                {% assign line_total = item.price | times: item.quantity %}
                {% assign subtotal = subtotal | plus: line_total %}
                <tr class="cart-item {% cycle 'cart-row-odd', 'cart-row-even' %}">
                  <td class="cart-item__product">
                    <img src="/images/{{ item.image }}" alt="{{ item.title | escape }}" width="80">
                    <div>
                      <a href="/products/{{ item.handle }}">{{ item.product_title | escape }}</a>
                      {% if item.variant_title %}<small>{{ item.variant_title }}</small>{% endif %}
                      {% if item.properties.size > 0 %}
                        <ul class="cart-item__properties">
                          {% for prop in item.properties %}
                            <li><em>{{ prop.name }}:</em> {{ prop.value | escape }}</li>
                          {% endfor %}
                        </ul>
                      {% endif %}
                    </div>
                  </td>
                  <td class="cart-item__price">
                    {% assign d = item.price | divided_by: 100 %}{% assign c = item.price | modulo: 100 %}
                    ${{ d }}.{% if c < 10 %}0{% endif %}{{ c }}
                    {% if item.original_price and item.original_price > item.price %}
                      {% assign od = item.original_price | divided_by: 100 %}{% assign oc = item.original_price | modulo: 100 %}
                      <s class="compare-price">${{ od }}.{% if oc < 10 %}0{% endif %}{{ oc }}</s>
                    {% endif %}
                  </td>
                  <td class="cart-item__qty">
                    <input type="number" name="updates[]" value="{{ item.quantity }}" min="0" data-line="{{ forloop.index }}">
                  </td>
                  <td class="cart-item__total">
                    {% assign td = line_total | divided_by: 100 %}{% assign tc = line_total | modulo: 100 %}
                    ${{ td }}.{% if tc < 10 %}0{% endif %}{{ tc }}
                  </td>
                </tr>
              {% endfor %}
            </tbody>
          </table>

          {%- comment -%}Cart summary with discount, tax, shipping{%- endcomment -%}
          <div class="cart-summary">
            {% assign sd = subtotal | divided_by: 100 %}{% assign sc = subtotal | modulo: 100 %}
            <div class="cart-summary__row">
              <span>Subtotal ({{ cart.item_count }} items)</span>
              <span>${{ sd }}.{% if sc < 10 %}0{% endif %}{{ sc }}</span>
            </div>

            {% if cart.discount_code %}
              {% assign discount_amount = subtotal | times: cart.discount_percent | divided_by: 100 %}
              {% assign subtotal = subtotal | minus: discount_amount %}
              {% assign dd = discount_amount | divided_by: 100 %}{% assign dc = discount_amount | modulo: 100 %}
              <div class="cart-summary__row cart-summary__discount">
                <span>Discount ({{ cart.discount_code }}, {{ cart.discount_percent }}% off)</span>
                <span>-${{ dd }}.{% if dc < 10 %}0{% endif %}{{ dc }}</span>
              </div>
            {% endif %}

            {% if subtotal >= 10000 %}
              {% assign shipping = 0 %}
              <div class="cart-summary__row"><span>Shipping</span><span>FREE</span></div>
            {% else %}
              {% assign shipping = 999 %}
              <div class="cart-summary__row"><span>Shipping</span><span>$9.99</span></div>
            {% endif %}

            {% assign tax = subtotal | times: 8 | divided_by: 100 %}
            {% assign txd = tax | divided_by: 100 %}{% assign txc = tax | modulo: 100 %}
            <div class="cart-summary__row">
              <span>Tax (8%)</span>
              <span>${{ txd }}.{% if txc < 10 %}0{% endif %}{{ txc }}</span>
            </div>

            {% assign grand_total = subtotal | plus: shipping | plus: tax %}
            {% assign gtd = grand_total | divided_by: 100 %}{% assign gtc = grand_total | modulo: 100 %}
            <div class="cart-summary__row cart-summary__total">
              <span>Total</span>
              <span>${{ gtd }}.{% if gtc < 10 %}0{% endif %}{{ gtc }}</span>
            </div>

            <button type="submit" class="button button--primary button--full">Checkout</button>
          </div>

          {%- comment -%}Upsell section — render product cards for suggestions{%- endcomment -%}
          {% if cart.upsell_products.size > 0 %}
            <section class="cart-upsells">
              <h2>Complete Your Order</h2>
              <div class="product-grid product-grid--3">
                {% render 'product-card' for cart.upsell_products as product %}
              </div>
            </section>
          {% endif %}

        {% else %}
          <div class="cart-empty">
            <p>Your cart is empty.</p>
            <a href="/collections/all" class="button">Start Shopping</a>
          </div>
        {% endif %}
      </main>

      {% render 'footer', shop: shop, footer_links: footer_links %}
    </body>
    </html>
  filesystem:
    header.liquid: |
      <header class="site-header">
        <a href="/" class="logo">{{ shop.name }}</a>
        <nav>{% for link in navigation %}<a href="{{ link.url }}">{{ link.title }}</a>{% endfor %}</nav>
        <a href="/cart">Cart ({{ cart_count }})</a>
      </header>
    footer.liquid: |
      <footer><p>&copy; {{ "now" | date: "%Y" }} {{ shop.name }}</p></footer>
    product-card.liquid: |
      <div class="product-card">
        <a href="/products/{{ product.handle }}">
          <img src="/images/{{ product.featured_image }}" alt="{{ product.title | escape }}" loading="lazy">
          <h3>{{ product.title | truncate: 40 }}</h3>
          {% assign d = product.price | divided_by: 100 %}{% assign c = product.price | modulo: 100 %}
          <span class="price">${{ d }}.{% if c < 10 %}0{% endif %}{{ c }}</span>
        </a>
      </div>
  environment:
    shop:
      name: "Alpine Gear Co."
    navigation:
      - title: Home
        url: /
      - title: Shop
        url: /collections/all
      - title: Cart
        url: /cart
    footer_links:
      - title: Shipping
        url: /shipping
    cart:
      item_count: 5
      discount_code: "WINTER25"
      discount_percent: 25
      items:
        - product_title: "Arbor Pro Draft 2025"
          variant_title: "157cm / Camber"
          handle: arbor-pro-draft-2025
          price: 49900
          original_price: 64900
          quantity: 1
          image: arbor-pro-draft.jpg
          properties: []
        - product_title: "Vans Aura OG Boots"
          variant_title: "Size 10 / Black"
          handle: vans-aura-og
          price: 22900
          original_price:
          quantity: 1
          image: vans-aura.jpg
          properties:
            - name: "Heat Molding"
              value: "Yes"
        - product_title: "Union Strata Bindings"
          variant_title: "Medium / Matte Black"
          handle: union-strata
          price: 29900
          original_price:
          quantity: 1
          image: union-strata.jpg
          properties: []
        - product_title: "Board Wax Kit"
          variant_title:
          handle: board-wax-kit
          price: 1999
          original_price: 2499
          quantity: 2
          image: wax-kit.jpg
          properties:
            - name: "Scent"
              value: "Cedar"
      upsell_products:
        - title: "Helmet Pro"
          handle: helmet-pro
          price: 12900
          featured_image: helmet.jpg
          available: true
        - title: "Goggles Elite"
          handle: goggles-elite
          price: 15900
          featured_image: goggles.jpg
          available: true
        - title: "Stomp Pad"
          handle: stomp-pad
          price: 999
          featured_image: stomp-pad.jpg
          available: true
  expected_pattern: "(?m)Your Cart.*Arbor Pro Draft.*\\$499\\.00.*\\$649\\.00.*Vans Aura.*Heat Molding.*Union Strata.*Board Wax Kit.*Cedar.*Subtotal.*5 items.*Discount.*WINTER25.*25%.*Shipping.*FREE.*Tax.*8%.*Total.*Checkout.*Complete Your Order.*Helmet.*Goggles.*Stomp"

# ═══════════════════════════════════════════════════════════════════════════════
# BENCHMARK: Order Confirmation Email (capture, nested loops, date formatting)
# ═══════════════════════════════════════════════════════════════════════════════

- name: bench_storefront_order_email
  template: |
    {%- comment -%}Order confirmation email — tests capture, date, and complex nesting{%- endcomment -%}
    {% capture email_subject %}Order {{ order.name }} confirmed — {{ shop.name }}{% endcapture %}
    <html>
    <body style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto;">
      <div style="background: #2d3748; color: white; padding: 20px; text-align: center;">
        <h1 style="margin: 0;">{{ shop.name }}</h1>
      </div>

      <div style="padding: 20px;">
        <h2>Thank you for your order, {{ customer.first_name }}!</h2>
        <p>We've received your order and are preparing it for shipment.</p>

        <div style="background: #f7fafc; padding: 15px; border-radius: 8px; margin: 20px 0;">
          <table style="width: 100%;">
            <tr><td><strong>Order:</strong></td><td>{{ order.name }}</td></tr>
            <tr><td><strong>Date:</strong></td><td>{{ order.created_at | date: "%B %e, %Y at %l:%M %p" }}</td></tr>
            <tr><td><strong>Status:</strong></td><td>{{ order.status | capitalize }}</td></tr>
            <tr><td><strong>Payment:</strong></td><td>{{ order.payment_method | capitalize }}</td></tr>
          </table>
        </div>

        <h3>Items Ordered</h3>
        <table style="width: 100%; border-collapse: collapse;">
          <thead>
            <tr style="background: #edf2f7;">
              <th style="padding: 8px; text-align: left;">Item</th>
              <th style="padding: 8px; text-align: center;">Qty</th>
              <th style="padding: 8px; text-align: right;">Each</th>
              <th style="padding: 8px; text-align: right;">Total</th>
            </tr>
          </thead>
          <tbody>
            {% for item in order.line_items %}
              <tr style="border-bottom: 1px solid #e2e8f0;">
                <td style="padding: 8px;">
                  {{ item.title | escape }}
                  {% if item.variant %}<br><small style="color: #718096;">{{ item.variant }}</small>{% endif %}
                  {% if item.properties.size > 0 %}
                    <br>
                    {% for prop in item.properties %}
                      <small style="color: #718096;">{{ prop.name }}: {{ prop.value | escape }}</small>{% unless forloop.last %}<br>{% endunless %}
                    {% endfor %}
                  {% endif %}
                </td>
                <td style="padding: 8px; text-align: center;">{{ item.quantity }}</td>
                <td style="padding: 8px; text-align: right;">
                  {% assign ed = item.unit_price | divided_by: 100 %}{% assign ec = item.unit_price | modulo: 100 %}
                  ${{ ed }}.{% if ec < 10 %}0{% endif %}{{ ec }}
                </td>
                <td style="padding: 8px; text-align: right;">
                  {% assign lt = item.unit_price | times: item.quantity %}
                  {% assign ltd = lt | divided_by: 100 %}{% assign ltc = lt | modulo: 100 %}
                  ${{ ltd }}.{% if ltc < 10 %}0{% endif %}{{ ltc }}
                </td>
              </tr>
            {% endfor %}
          </tbody>
        </table>

        <div style="margin-top: 20px; text-align: right;">
          {% assign ord_sd = order.subtotal | divided_by: 100 %}{% assign ord_sc = order.subtotal | modulo: 100 %}
          <p>Subtotal: ${{ ord_sd }}.{% if ord_sc < 10 %}0{% endif %}{{ ord_sc }}</p>
          {% if order.discount_amount > 0 %}
            {% assign disc_d = order.discount_amount | divided_by: 100 %}{% assign disc_c = order.discount_amount | modulo: 100 %}
            <p style="color: #48bb78;">Discount: -${{ disc_d }}.{% if disc_c < 10 %}0{% endif %}{{ disc_c }}</p>
          {% endif %}
          {% assign ship_d = order.shipping | divided_by: 100 %}{% assign ship_c = order.shipping | modulo: 100 %}
          <p>Shipping: {% if order.shipping == 0 %}FREE{% else %}${{ ship_d }}.{% if ship_c < 10 %}0{% endif %}{{ ship_c }}{% endif %}</p>
          {% assign tax_d = order.tax | divided_by: 100 %}{% assign tax_c = order.tax | modulo: 100 %}
          <p>Tax: ${{ tax_d }}.{% if tax_c < 10 %}0{% endif %}{{ tax_c }}</p>
          {% assign tot_d = order.total | divided_by: 100 %}{% assign tot_c = order.total | modulo: 100 %}
          <p style="font-size: 1.2em;"><strong>Total: ${{ tot_d }}.{% if tot_c < 10 %}0{% endif %}{{ tot_c }}</strong></p>
        </div>

        <div style="display: flex; margin-top: 30px; gap: 20px;">
          <div style="flex: 1;">
            <h4>Shipping Address</h4>
            <p>
              {{ order.shipping_address.name }}<br>
              {{ order.shipping_address.line1 }}<br>
              {% if order.shipping_address.line2 %}{{ order.shipping_address.line2 }}<br>{% endif %}
              {{ order.shipping_address.city }}, {{ order.shipping_address.state }} {{ order.shipping_address.zip }}<br>
              {{ order.shipping_address.country }}
            </p>
          </div>
          <div style="flex: 1;">
            <h4>Billing Address</h4>
            <p>
              {{ order.billing_address.name }}<br>
              {{ order.billing_address.line1 }}<br>
              {% if order.billing_address.line2 %}{{ order.billing_address.line2 }}<br>{% endif %}
              {{ order.billing_address.city }}, {{ order.billing_address.state }} {{ order.billing_address.zip }}<br>
              {{ order.billing_address.country }}
            </p>
          </div>
        </div>

        {% if order.note %}
          <div style="background: #fffff0; padding: 12px; border-radius: 4px; margin-top: 20px;">
            <strong>Order Note:</strong> {{ order.note | escape }}
          </div>
        {% endif %}
      </div>

      <div style="background: #f7fafc; padding: 15px; text-align: center; font-size: 12px; color: #718096;">
        <p>Questions? Reply to this email or contact us at {{ shop.email }}</p>
        <p>&copy; {{ "now" | date: "%Y" }} {{ shop.name }} | <a href="{{ shop.url }}">{{ shop.url | remove: "https://" }}</a></p>
      </div>
    </body>
    </html>
  environment:
    shop:
      name: "Alpine Gear Co."
      email: "support@alpinegear.example.com"
      url: "https://alpinegear.example.com"
    customer:
      first_name: Emily
      last_name: Johnson
      email: emily.j@example.com
    order:
      name: "#AG-20251234"
      created_at: "2025-03-15T14:30:00Z"
      status: confirmed
