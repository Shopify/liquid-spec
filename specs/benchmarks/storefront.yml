# ═══════════════════════════════════════════════════════════════════════════════
# BENCHMARK: Collection Page with Filtering/Sorting (complex data processing)
# ═══════════════════════════════════════════════════════════════════════════════

- name: bench_storefront_collection_page
  template: |
    {%- comment -%}Collection page with server-side filtering, sorting, and pagination{%- endcomment -%}
    <!DOCTYPE html>
    <html>
    <head><title>{{ collection.title | escape }} — {{ shop.name }}</title></head>
    <body>
      {% render 'header', shop: shop, navigation: navigation, cart_count: 2 %}

      <main class="collection-page">
        <div class="collection-header">
          <h1>{{ collection.title }}</h1>
          {% if collection.description %}
            <p>{{ collection.description | strip_html | truncate: 200 }}</p>
          {% endif %}
          <p class="collection-count">{{ collection.products | size }} products</p>
        </div>

        {%- comment -%}Filter and sort products{%- endcomment -%}
        {% assign filtered = collection.products %}

        {%- comment -%}Filter by tag if set{%- endcomment -%}
        {% if active_tag %}
          {% assign filtered = filtered | where: "type", active_tag %}
        {% endif %}

        {%- comment -%}Filter by availability{%- endcomment -%}
        {% if show_available_only %}
          {% assign filtered = filtered | where: "available", true %}
        {% endif %}

        {%- comment -%}Sort{%- endcomment -%}
        {% case sort_by %}
          {% when "price-asc" %}
            {% assign filtered = filtered | sort: "price" %}
          {% when "price-desc" %}
            {% assign filtered = filtered | sort: "price" | reverse %}
          {% when "title" %}
            {% assign filtered = filtered | sort_natural: "title" %}
          {% when "newest" %}
            {% assign filtered = filtered | sort: "created_at" | reverse %}
          {% else %}
            {%- comment -%}default/manual order{%- endcomment -%}
        {% endcase %}

        {% assign total = filtered | size %}
        {% assign page_size = 6 %}
        {% assign current_page_idx = current_page | default: 1 | minus: 1 %}
        {% assign offset = current_page_idx | times: page_size %}
        {% assign total_pages = total | divided_by: page_size %}
        {% assign remainder = total | modulo: page_size %}
        {% if remainder > 0 %}{% assign total_pages = total_pages | plus: 1 %}{% endif %}

        {%- comment -%}Sidebar: extract unique types and tag counts{%- endcomment -%}
        <aside class="collection-sidebar">
          <h3>Product Types</h3>
          <ul>
            {% assign all_types = collection.products | map: "type" | uniq | sort_natural %}
            {% for t in all_types %}
              <li{% if t == active_tag %} class="active"{% endif %}>
                <a href="?type={{ t | downcase | url_encode }}">{{ t }}</a>
              </li>
            {% endfor %}
          </ul>

          <h3>Price Ranges</h3>
          <ul>
            {% for range in price_ranges %}
              {% assign range_count = 0 %}
              {% for p in filtered %}
                {% if p.price >= range.min and p.price <= range.max %}
                  {% assign range_count = range_count | plus: 1 %}
                {% endif %}
              {% endfor %}
              <li>
                {% assign min_d = range.min | divided_by: 100 %}{% assign max_d = range.max | divided_by: 100 %}
                <a href="?price={{ range.min }}-{{ range.max }}">${{ min_d }} – ${{ max_d }}</a>
                <span class="count">({{ range_count }})</span>
              </li>
            {% endfor %}
          </ul>

          <h3>Tags</h3>
          {% assign all_tags = "" %}
          {% for p in collection.products %}
            {% for tag in p.tags %}
              {% assign all_tags = all_tags | append: tag | append: "|" %}
            {% endfor %}
          {% endfor %}
          {% assign tag_list = all_tags | split: "|" | compact | sort_natural | uniq %}
          <ul class="tag-cloud">
            {% for tag in tag_list limit: 15 %}
              <li><a href="?tag={{ tag | url_encode }}">{{ tag | capitalize }}</a></li>
            {% endfor %}
          </ul>
        </aside>

        {%- comment -%}Product grid{%- endcomment -%}
        <div class="collection-grid">
          <div class="toolbar">
            <span>Showing {{ offset | plus: 1 }}–{% assign page_end = offset | plus: page_size %}{% if page_end > total %}{% assign page_end = total %}{% endif %}{{ page_end }} of {{ total }}</span>
            <select name="sort">
              <option value="manual"{% if sort_by == nil %} selected{% endif %}>Featured</option>
              <option value="price-asc"{% if sort_by == "price-asc" %} selected{% endif %}>Price: Low to High</option>
              <option value="price-desc"{% if sort_by == "price-desc" %} selected{% endif %}>Price: High to Low</option>
              <option value="title"{% if sort_by == "title" %} selected{% endif %}>Alphabetical</option>
            </select>
          </div>

          <div class="product-grid product-grid--3">
            {% for product in filtered limit: page_size offset: offset %}
              {% render 'product-card', product: product %}
            {% endfor %}
          </div>

          {%- comment -%}Pagination{%- endcomment -%}
          {% if total_pages > 1 %}
            <nav class="pagination" aria-label="Collection pagination">
              {% if current_page > 1 %}
                <a href="?page={{ current_page | minus: 1 }}" class="pagination__prev">&laquo; Previous</a>
              {% endif %}
              {% for i in (1..total_pages) %}
                {% if i == current_page %}
                  <span class="pagination__current" aria-current="page">{{ i }}</span>
                {% else %}
                  <a href="?page={{ i }}" class="pagination__link">{{ i }}</a>
                {% endif %}
              {% endfor %}
              {% if current_page < total_pages %}
                <a href="?page={{ current_page | plus: 1 }}" class="pagination__next">Next &raquo;</a>
              {% endif %}
            </nav>
          {% endif %}
        </div>
      </main>

      {% render 'footer', shop: shop, footer_links: footer_links %}
    </body>
    </html>
