# ═══════════════════════════════════════════════════════════════════════════════
# BENCHMARK: CMS Page with Dynamic Sections (dynamic include dispatch)
# ═══════════════════════════════════════════════════════════════════════════════

- name: bench_storefront_cms_page
  template: |
    {%- comment -%}CMS page with dynamic section rendering — tests dynamic includes heavily{%- endcomment -%}
    <!DOCTYPE html>
    <html>
    <head><title>{{ page.title | escape }} — {{ shop.name }}</title></head>
    <body>
      {% render 'header', shop: shop, navigation: navigation, cart_count: 0 %}

      <main class="page-content">
        <h1>{{ page.title }}</h1>

        {% for section in page.sections %}
          <section class="section section--{{ section.type }}" id="section-{{ forloop.index }}">
            {% include section.type, section: section %}
          </section>
        {% endfor %}
      </main>

      {% render 'footer', shop: shop, footer_links: footer_links %}
    </body>
    </html>
  filesystem:
    header.liquid: |
      <header><a href="/">{{ shop.name }}</a><nav>{% for link in navigation %}<a href="{{ link.url }}">{{ link.title }}</a> {% endfor %}</nav><a href="/cart">Cart ({{ cart_count }})</a></header>
    footer.liquid: |
      <footer><p>&copy; {{ "now" | date: "%Y" }} {{ shop.name }}</p></footer>
    hero_banner.liquid: |
      <div class="hero" style="background-image: url('{{ section.background | escape }}')">
        <h2>{{ section.heading | escape }}</h2>
        <p>{{ section.subheading | escape }}</p>
        {% if section.cta_text %}
          <a href="{{ section.cta_url }}" class="button">{{ section.cta_text }}</a>
        {% endif %}
      </div>
    featured_collection.liquid: |
      <div class="featured-collection">
        <h2>{{ section.heading }}</h2>
        <div class="product-grid">
          {% for product in section.products limit: section.limit %}
            <div class="product-card">
              <a href="/products/{{ product.handle }}">
                <img src="/images/{{ product.image }}" alt="{{ product.title | escape }}" loading="lazy">
                <h3>{{ product.title | truncate: 35 }}</h3>
                {% assign d = product.price | divided_by: 100 %}{% assign c = product.price | modulo: 100 %}
                <span class="price">${{ d }}.{% if c < 10 %}0{% endif %}{{ c }}</span>
                {% if product.on_sale %}<span class="badge">Sale</span>{% endif %}
              </a>
            </div>
          {% endfor %}
        </div>
        {% if section.view_all_url %}
          <a href="{{ section.view_all_url }}" class="link">View All &rarr;</a>
        {% endif %}
      </div>
    rich_text.liquid: |
      <div class="rich-text">
        <h2>{{ section.heading }}</h2>
        <div class="rich-text__body">{{ section.content }}</div>
      </div>
    image_with_text.liquid: |
      <div class="image-text {% if section.image_position == 'right' %}image-text--reversed{% endif %}">
        <div class="image-text__image">
          <img src="{{ section.image | prepend: '/images/' }}" alt="{{ section.image_alt | escape }}" loading="lazy">
        </div>
        <div class="image-text__content">
          <h2>{{ section.heading }}</h2>
          {{ section.content }}
          {% if section.button_text %}
            <a href="{{ section.button_url }}" class="button">{{ section.button_text }}</a>
          {% endif %}
        </div>
      </div>
    testimonials.liquid: |
      <div class="testimonials">
        <h2>{{ section.heading }}</h2>
        <div class="testimonials__grid">
          {% for testimonial in section.items %}
            <blockquote class="testimonial {% cycle 'bg-light', 'bg-white', 'bg-light' %}">
              <p>"{{ testimonial.quote | escape }}"</p>
              <cite>
                {{ testimonial.author }}
                {% if testimonial.title %}<span>{{ testimonial.title }}</span>{% endif %}
              </cite>
              <div class="rating">{% for i in (1..5) %}{% if i <= testimonial.rating %}★{% else %}☆{% endif %}{% endfor %}</div>
            </blockquote>
          {% endfor %}
        </div>
      </div>
    newsletter.liquid: |
      <div class="newsletter" style="background: {{ section.bg_color | default: '#f7fafc' }};">
        <h2>{{ section.heading }}</h2>
        <p>{{ section.description }}</p>
        <form action="/subscribe" method="post" class="newsletter__form">
          <input type="email" name="email" placeholder="{{ section.placeholder | default: 'Enter your email' }}" required>
          <button type="submit">{{ section.button_text | default: "Subscribe" }}</button>
        </form>
      </div>
    faq.liquid: |
      <div class="faq">
        <h2>{{ section.heading }}</h2>
        {% for item in section.items %}
          <details class="faq__item"{% if forloop.first %} open{% endif %}>
            <summary>{{ item.question | escape }}</summary>
            <div class="faq__answer">{{ item.answer }}</div>
          </details>
        {% endfor %}
      </div>
  environment:
    shop:
      name: "Alpine Gear Co."
    navigation:
      - title: Home
        url: /
      - title: Shop
        url: /collections/all
      - title: About
        url: /about
    footer_links:
      - title: Shipping
        url: /shipping
      - title: Returns
        url: /returns
    page:
      title: "Welcome to Alpine Gear"
      sections:
        - type: hero_banner
          heading: "Gear Up for Winter 2025"
          subheading: "Premium snowboard equipment from the world's best brands"
          background: "hero-winter-2025.jpg"
          cta_text: "Shop Now"
          cta_url: "/collections/all"
        - type: featured_collection
          heading: "New Arrivals"
          limit: 4
          view_all_url: "/collections/new"
          products:
            - title: "Arbor Pro Draft 2025"
              handle: arbor-pro-draft-2025
              image: arbor-pro-draft.jpg
              price: 49900
              on_sale: true
            - title: "Burton Custom Flying V"
              handle: burton-custom-flying-v
              image: burton-custom.jpg
              price: 44900
              on_sale: false
            - title: "Jones Mountain Twin"
              handle: jones-mountain-twin
              image: jones-mt.jpg
              price: 52900
              on_sale: true
            - title: "Capita DOA 2025"
              handle: capita-doa
              image: capita-doa.jpg
              price: 39900
              on_sale: false
            - title: "GNU Riders Choice"
              handle: gnu-riders
              image: gnu-riders.jpg
              price: 47900
              on_sale: false
        - type: image_with_text
          heading: "Sustainably Made"
          content: "<p>Every board in our lineup is built with eco-conscious materials. From recycled sidewalls to bio-resin construction, we're committed to protecting the mountains we ride.</p>"
          image: sustainability.jpg
          image_alt: "Eco-friendly snowboard construction"
          image_position: left
          button_text: "Learn More"
          button_url: "/about/sustainability"
        - type: rich_text
          heading: "Why Choose Alpine Gear?"
          content: |
            <p>With over 15 years of experience outfitting riders at every level, we know gear. Our staff are certified instructors and passionate riders who test every product we sell.</p>
            <ul>
              <li>Free shipping on orders over $100</li>
              <li>30-day no-questions-asked returns</li>
              <li>Expert gear fitting via video call</li>
              <li>Price match guarantee</li>
            </ul>
        - type: testimonials
          heading: "What Riders Say"
          items:
            - quote: "Best online shop for snowboard gear. The team really knows their stuff and the shipping was incredibly fast."
              author: "Mike T."
              title: "Verified Buyer"
              rating: 5
            - quote: "I was skeptical about buying boots online but the video fitting service was amazing. Perfect fit on the first try."
              author: "Sarah K."
              title: "Pro Rider"
              rating: 5
            - quote: "Great selection and prices. The only store I trust for my gear now."
              author: "Jake R."
              title: null
              rating: 4
            - quote: "Excellent customer service. They went above and beyond to help me find the right board for my riding style."
              author: "Emma L."
              title: "Verified Buyer"
              rating: 5
        - type: featured_collection
          heading: "Best Sellers"
          limit: 3
          view_all_url: "/collections/best-sellers"
          products:
            - title: "Vans Aura OG Boots"
              handle: vans-aura-og
              image: vans-aura.jpg
              price: 22900
              on_sale: true
            - title: "Union Strata Bindings"
              handle: union-strata
              image: union-strata.jpg
              price: 29900
              on_sale: false
            - title: "Board Wax Kit"
              handle: board-wax-kit
              image: wax-kit.jpg
              price: 1999
              on_sale: false
        - type: faq
          heading: "Frequently Asked Questions"
          items:
            - question: "What size snowboard should I get?"
              answer: "<p>Board size depends on your weight, height, riding style, and ability level. As a general rule, the board should come up between your chin and nose when standing on end. Contact us for a personalized recommendation.</p>"
            - question: "Do you offer international shipping?"
              answer: "<p>Yes! We ship to over 30 countries. International shipping rates are calculated at checkout based on weight and destination.</p>"
            - question: "What's your return policy?"
              answer: "<p>We offer 30-day returns on all unused gear in original packaging. Used gear can be returned within 7 days if defective. See our <a href='/policies/returns'>return policy</a> for details.</p>"
            - question: "How do I know if boots fit correctly?"
              answer: "<p>Book a free video fitting session with our boot experts. We'll walk you through sizing and heat molding options to ensure the perfect fit.</p>"
        - type: newsletter
          heading: "Stay in the Loop"
          description: "Get first access to new arrivals, exclusive deals, and riding tips delivered to your inbox."
          placeholder: "your@email.com"
          button_text: "Join the Crew"
          bg_color: "#2d3748"
  expected_pattern: "(?m)Alpine Gear.*hero.*Gear Up for Winter 2025.*Shop Now.*featured-collection.*New Arrivals.*Arbor Pro Draft.*\\$499\\.00.*Sale.*Burton Custom.*Jones Mountain.*Capita DOA.*View All.*image-text.*Sustainably Made.*eco-conscious.*rich-text.*Why Choose.*Free shipping.*30-day.*testimonials.*What Riders Say.*Mike T.*★★★★★.*Sarah K.*Pro Rider.*Best Sellers.*Vans Aura.*Union Strata.*faq.*What size snowboard.*return policy.*newsletter.*Stay in the Loop.*Join the Crew"
