---
_metadata:
  hint: Real Shopify Dream theme benchmark — requires shopify_filters feature
  doc: implementers/shopify-theme-filters.md
  required_features:
    - shopify_filters
  data_files:
    - _data/theme_database.yml
specs:
- name: shopify_theme_search_page
  template: |
    <div class="template-search">
      <div class="container">
        <h1 class="page-title">Search Results</h1>

        <div class="search-form">
          <form action="/search" method="get" role="search">
            <div class="search-form__field">
              <input type="search" name="q" class="search-form__input" value="{{ search.terms | escape }}" placeholder="Search our store">
              <button type="submit" class="search-form__button">Search</button>
            </div>
          </form>
        </div>

        {% if search.performed %}
          <div class="search-results">
            <p class="search-results__count">
              {% if search.results_count == 0 %}
                No results found for "{{ search.terms | escape }}".
              {% else %}
                {{ search.results_count }} result{% if search.results_count != 1 %}s{% endif %} for "{{ search.terms | escape }}".
              {% endif %}
            </p>

            {% if search.results_count > 0 %}
              {% assign _results = search.results %}
              {% paginate _results by 12 %}
                <div class="search-results__items product-grid">
                  {% for item in _results %}
                    {% if item.object_type == 'product' %}
                      {% assign product = item %}
                      {% include 'product-card' %}
                    {% else %}
                      <div class="search-item">
                        <h3 class="search-item__title">
                          <a href="{{ item.url }}">{{ item.title }}</a>
                        </h3>
                        <div class="search-item__type">{{ item.object_type | capitalize }}</div>
                        <div class="search-item__excerpt">
                          {{ item.content | strip_html | truncatewords: 50 }}
                        </div>
                      </div>
                    {% endif %}
                  {% endfor %}
                </div>

                {% if paginate.pages > 1 %}
                  <div class="pagination">
                    {{ paginate | default_pagination }}
                  </div>
                {% endif %}
              {% endpaginate %}
            {% endif %}
          </div>
        {% endif %}
      </div>
    </div>
  filesystem:
    product-card.liquid: |
      {% comment %}
        Reusable product card for collection grids and featured products
      {% endcomment %}
      <div class="product-card">
        <a href="{{ product.url }}" class="product-card__link">
          <div class="product-card__image">
            <img src="{{ product.featured_image | product_img_url: 'medium' }}" alt="{{ product.title | escape }}">
          </div>
          <div class="product-card__info">
            <h3 class="product-card__title">{{ product.title }}</h3>
            <div class="product-card__price">
              {% if product.compare_at_price > product.price %}
                <span class="product-card__price--sale">{{ product.price | money }}</span>
                <span class="product-card__price--compare">{{ product.compare_at_price | money }}</span>
              {% else %}
                <span class="product-card__price--regular">{{ product.price | money }}</span>
              {% endif %}
            </div>
          </div>
        </a>
        <form action="/cart/add" method="post" class="product-card__form">
          <input type="hidden" name="id" value="{{ product.variants.first.id }}">
          <button type="submit" class="product-card__button">Add to Cart</button>
        </form>
      </div>
  environment: {}
  expected_pattern: "(?m)template-search.*Search Results.*25 results.*snowboard.*product-card.*\\$.*pagination"
