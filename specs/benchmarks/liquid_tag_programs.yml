---
_metadata:
  hint: |
    Benchmarks written entirely in {% liquid %} tag syntax with # comments.
    These test the "program mode" of Liquid — complex multi-line logic in
    a single block, using echo instead of {{ }}, and # comments instead of
    {% comment %}. Every benchmark here uses only standard Liquid features.
  minimum_complexity: 1000
specs:

# ═══════════════════════════════════════════════════════════════════════════════
# BENCHMARK: Inventory Report Generator
# Parses pipe-delimited product data, categorizes by department, computes
# totals, and formats a full report — all in one {% liquid %} block.
# ═══════════════════════════════════════════════════════════════════════════════

- name: bench_liquid_tag_inventory_report
  complexity: 1000
  hint: |
    A complete data processing pipeline in a single {% liquid %} block.
    Parses pipe-delimited product data, groups by category, computes per-category
    and grand totals, formats output. Tests: split, nested for loops, if/endif,
    string comparison, plus (accumulation + type coercion), append chains,
    upcase, size, and echo with filters.
  template: |
    {%- liquid
      # ════════════════════════════════════════════════════════════════════
      # INVENTORY REPORT GENERATOR
      # Processes raw product data, categorizes, and formats a report.
      # ════════════════════════════════════════════════════════════════════

      # Step 1: Parse raw product data (pipe-separated: name|category|price|qty)
      assign raw = "Widget A|electronics|29.99|150,Widget B|electronics|49.99|80,Gadget X|electronics|199.99|12,T-Shirt M|clothing|24.99|200,Jeans L|clothing|59.99|45,Jacket XL|clothing|129.99|15,Hammer|tools|19.99|90,Drill|tools|89.99|30,Wrench Set|tools|34.99|60,Novel ABC|books|14.99|300,Textbook 101|books|79.99|25,Cookbook Pro|books|29.99|100"
      assign rows = raw | split: ","

      # Step 2: Categorize and compute totals
      assign categories = "electronics,clothing,tools,books" | split: ","
      assign grand_total_qty = 0
      assign report_lines = ""

      for cat in categories
        # Per-category accumulators
        assign cat_qty = 0
        assign cat_items = 0
        assign cat_lines = ""

        for row in rows
          assign fields = row | split: "|"
          assign item_cat = fields[1]
          if item_cat == cat
            assign item_name = fields[0]
            assign item_price = fields[2]
            assign item_qty = fields[3] | plus: 0
            assign cat_qty = cat_qty | plus: item_qty
            assign cat_items = cat_items | plus: 1

            # Format: "Name ($price) xQty"
            if cat_lines != ""
              assign cat_lines = cat_lines | append: "; "
            endif
            assign cat_lines = cat_lines | append: item_name | append: " ($" | append: item_price | append: ") x" | append: item_qty
          endif
        endfor

        assign grand_total_qty = grand_total_qty | plus: cat_qty

        # Build category header + items
        assign cat_upper = cat | upcase
        assign cat_summary = cat_upper | append: " [" | append: cat_items | append: " items, " | append: cat_qty | append: " units]: " | append: cat_lines
        if report_lines != ""
          assign report_lines = report_lines | append: " || "
        endif
        assign report_lines = report_lines | append: cat_summary
      endfor

      # Step 3: Final output
      echo "INVENTORY REPORT (" | append: rows.size | append: " products, " | append: grand_total_qty | append: " total units) --- "
      echo report_lines
    -%}
  expected: "INVENTORY REPORT (12 products, 1107 total units) --- ELECTRONICS [3 items, 242 units]: Widget A ($29.99) x150; Widget B ($49.99) x80; Gadget X ($199.99) x12 || CLOTHING [3 items, 260 units]: T-Shirt M ($24.99) x200; Jeans L ($59.99) x45; Jacket XL ($129.99) x15 || TOOLS [3 items, 180 units]: Hammer ($19.99) x90; Drill ($89.99) x30; Wrench Set ($34.99) x60 || BOOKS [3 items, 425 units]: Novel ABC ($14.99) x300; Textbook 101 ($79.99) x25; Cookbook Pro ($29.99) x100"

# ═══════════════════════════════════════════════════════════════════════════════
# BENCHMARK: Markdown-style Table Generator
# Builds a formatted text table from structured data using only string ops.
# ═══════════════════════════════════════════════════════════════════════════════

- name: bench_liquid_tag_table_generator
  complexity: 1000
  hint: |
    Generates a formatted employee report from structured data. Uses capture
    to obtain a newline character (liquid tag strings can't contain literal
    newlines), then builds multi-line output with append. Tests: capture for
    newline trick, for loops with forloop object, assign with filter chains,
    truncate, plus/divided_by, if/elsif/else, echo, and size.
  template: |
    {%- capture nl %}
    {% endcapture -%}
    {%- liquid
      # ════════════════════════════════════════════════════════════════════
      # TABLE GENERATOR
      # Formats employee data into a text table with summary stats.
      # ════════════════════════════════════════════════════════════════════

      # Column headers
      assign output = "NAME           | DEPT       | YRS | LEVEL"
      assign output = output | append: nl | append: "---------------|------------|-----|------"

      assign total_years = 0
      assign senior_count = 0
      assign dept_engineering = 0
      assign dept_design = 0
      assign dept_marketing = 0

      for emp in employees
        # Format name column (pad to 15 chars)
        assign name_display = emp.name | truncate: 15, ""

        # Department column
        assign dept_display = emp.dept | truncate: 10, ""

        # Years and level
        assign years = emp.years | plus: 0
        assign total_years = total_years | plus: years

        # Determine level based on years
        if years >= 10
          assign level = "Sr"
          assign senior_count = senior_count | plus: 1
        elsif years >= 5
          assign level = "Mid"
        else
          assign level = "Jr"
        endif

        # Track department counts
        if emp.dept == "engineering"
          assign dept_engineering = dept_engineering | plus: 1
        elsif emp.dept == "design"
          assign dept_design = dept_design | plus: 1
        elsif emp.dept == "marketing"
          assign dept_marketing = dept_marketing | plus: 1
        endif

        # Append row
        assign output = output | append: nl | append: name_display | append: " | " | append: dept_display | append: " | " | append: years | append: "   | " | append: level
      endfor

      # Summary
      assign avg_years = total_years | divided_by: employees.size
      assign output = output | append: nl | append: "--- SUMMARY: " | append: employees.size | append: " employees, " | append: senior_count | append: " senior, avg " | append: avg_years | append: "yrs | eng:" | append: dept_engineering | append: " des:" | append: dept_design | append: " mkt:" | append: dept_marketing
      echo output
    -%}
  environment:
    employees:
      - { name: "Alice Johnson", dept: "engineering", years: 12 }
      - { name: "Bob Smith", dept: "design", years: 7 }
      - { name: "Carol Williams", dept: "engineering", years: 3 }
      - { name: "Dave Brown", dept: "marketing", years: 15 }
      - { name: "Eve Davis", dept: "design", years: 5 }
      - { name: "Frank Miller", dept: "engineering", years: 8 }
      - { name: "Grace Wilson", dept: "marketing", years: 2 }
      - { name: "Hank Moore", dept: "engineering", years: 11 }
  expected: |-
    NAME           | DEPT       | YRS | LEVEL
    ---------------|------------|-----|------
    Alice Johnson | engineerin | 12   | Sr
    Bob Smith | design | 7   | Mid
    Carol Williams | engineerin | 3   | Jr
    Dave Brown | marketing | 15   | Sr
    Eve Davis | design | 5   | Mid
    Frank Miller | engineerin | 8   | Mid
    Grace Wilson | marketing | 2   | Jr
    Hank Moore | engineerin | 11   | Sr
    --- SUMMARY: 8 employees, 3 senior, avg 7yrs | eng:4 des:2 mkt:2

# ═══════════════════════════════════════════════════════════════════════════════
# BENCHMARK: Shopping Cart Price Calculator
# Multi-step cart calculation: discounts, tax tiers, shipping, formatting.
# ═══════════════════════════════════════════════════════════════════════════════

- name: bench_liquid_tag_cart_calculator
  complexity: 1000
  hint: |
    Full shopping cart calculation in a liquid tag. Computes line totals,
    applies category-based discounts, calculates tax and shipping tiers,
    formats a receipt. Tests: nested for loops, case/when, math filters
    (plus/minus/times/divided_by/modulo), string building, forloop.last,
    comparison operators, assign chains.
  template: |
    {%- liquid
      # ════════════════════════════════════════════════════════════════════
      # SHOPPING CART CALCULATOR
      # Computes totals, applies discounts, tax, and shipping.
      # ════════════════════════════════════════════════════════════════════

      assign subtotal = 0
      assign item_count = 0
      assign receipt = ""

      for item in cart
        assign line_total = item.price | times: item.qty
        assign item_count = item_count | plus: item.qty

        # Category discount: electronics 10%, books 5%, other 0%
        case item.category
          when "electronics"
            assign discount_pct = 10
          when "books"
            assign discount_pct = 5
          else
            assign discount_pct = 0
        endcase

        assign discount_amount = line_total | times: discount_pct | divided_by: 100
        assign line_after_discount = line_total | minus: discount_amount
        assign subtotal = subtotal | plus: line_after_discount

        # Build receipt line
        assign line = item.name | append: " x" | append: item.qty | append: " @ $" | append: item.price | append: " = $" | append: line_after_discount
        if discount_pct > 0
          assign line = line | append: " (-" | append: discount_pct | append: "%)"
        endif
        if receipt != ""
          assign receipt = receipt | append: " | "
        endif
        assign receipt = receipt | append: line
      endfor

      # Shipping tier based on subtotal
      if subtotal >= 200
        assign shipping = 0
        assign ship_label = "FREE"
      elsif subtotal >= 100
        assign shipping = 5
        assign ship_label = "$5"
      else
        assign shipping = 12
        assign ship_label = "$12"
      endif

      # Tax (8%)
      assign tax = subtotal | times: 8 | divided_by: 100
      assign total = subtotal | plus: tax | plus: shipping

      echo receipt | append: " || "
      echo "Subtotal: $" | append: subtotal | append: " | Tax(8%): $" | append: tax | append: " | Shipping: " | append: ship_label | append: " | TOTAL: $" | append: total
    -%}
  environment:
    cart:
      - { name: "Laptop", category: "electronics", price: 80, qty: 1 }
      - { name: "Mouse", category: "electronics", price: 25, qty: 2 }
      - { name: "Novel", category: "books", price: 15, qty: 3 }
      - { name: "Desk Lamp", category: "home", price: 35, qty: 1 }
      - { name: "Headphones", category: "electronics", price: 60, qty: 1 }
  expected: "Laptop x1 @ $80 = $72 (-10%) | Mouse x2 @ $25 = $45 (-10%) | Novel x3 @ $15 = $43 (-5%) | Desk Lamp x1 @ $35 = $35 | Headphones x1 @ $60 = $54 (-10%) || Subtotal: $249 | Tax(8%): $19 | Shipping: FREE | TOTAL: $268"

# ═══════════════════════════════════════════════════════════════════════════════
# BENCHMARK: Log Analyzer
# Parses structured log entries, groups by severity, computes stats.
# ═══════════════════════════════════════════════════════════════════════════════

- name: bench_liquid_tag_log_analyzer
  complexity: 1000
  hint: |
    Parses a batch of log entries and generates an analysis report. Groups by
    severity (ERROR/WARN/INFO), counts per-service occurrences, identifies
    the most common error service. Tests: split, nested loops, case/when,
    string comparison, multiple accumulators, if/elsif chains, math filters,
    and complex string formatting with echo.
  template: |
    {%- liquid
      # ════════════════════════════════════════════════════════════════════
      # LOG ANALYZER
      # Parses pipe-delimited log entries and generates analysis.
      # Format: timestamp|severity|service|message
      # ════════════════════════════════════════════════════════════════════

      assign logs = "10:01|ERROR|auth|login failed,10:02|INFO|api|request ok,10:03|WARN|db|slow query 230ms,10:04|ERROR|auth|token expired,10:05|INFO|api|request ok,10:06|ERROR|db|connection timeout,10:07|INFO|auth|login success,10:08|WARN|api|rate limit 80%,10:09|ERROR|auth|invalid token,10:10|INFO|db|query ok,10:11|WARN|db|slow query 450ms,10:12|ERROR|api|upstream 503,10:13|INFO|api|request ok,10:14|ERROR|db|deadlock detected,10:15|WARN|auth|password near expiry,10:16|INFO|api|request ok,10:17|ERROR|auth|session hijack attempt,10:18|INFO|db|backup complete,10:19|WARN|api|deprecated endpoint,10:20|ERROR|db|disk space low"
      assign entries = logs | split: ","

      # Severity counters
      assign error_count = 0
      assign warn_count = 0
      assign info_count = 0

      # Per-service error counters
      assign auth_errors = 0
      assign api_errors = 0
      assign db_errors = 0

      # Collect error messages
      assign error_details = ""

      for entry in entries
        assign parts = entry | split: "|"
        assign time = parts[0]
        assign severity = parts[1]
        assign service = parts[2]
        assign message = parts[3]

        case severity
          when "ERROR"
            assign error_count = error_count | plus: 1
            # Track per-service errors
            if service == "auth"
              assign auth_errors = auth_errors | plus: 1
            elsif service == "api"
              assign api_errors = api_errors | plus: 1
            elsif service == "db"
              assign db_errors = db_errors | plus: 1
            endif
            # Collect error details
            if error_details != ""
              assign error_details = error_details | append: "; "
            endif
            assign error_details = error_details | append: time | append: " " | append: service | append: ":" | append: message
          when "WARN"
            assign warn_count = warn_count | plus: 1
          when "INFO"
            assign info_count = info_count | plus: 1
        endcase
      endfor

      # Find highest error service
      assign top_service = "auth"
      assign top_count = auth_errors
      if api_errors > top_count
        assign top_service = "api"
        assign top_count = api_errors
      endif
      if db_errors > top_count
        assign top_service = "db"
        assign top_count = db_errors
      endif

      # Error rate
      assign total = entries.size
      assign error_pct = error_count | times: 100 | divided_by: total

      # Output
      echo "LOG ANALYSIS (" | append: total | append: " entries) "
      echo "Errors:" | append: error_count | append: " Warnings:" | append: warn_count | append: " Info:" | append: info_count | append: " "
      echo "Error rate:" | append: error_pct | append: "% "
      echo "Top error source:" | append: top_service | append: "(" | append: top_count | append: ") "
      echo "Errors: " | append: error_details
    -%}
  expected: "LOG ANALYSIS (20 entries) Errors:8 Warnings:5 Info:7 Error rate:40% Top error source:auth(4) Errors: 10:01 auth:login failed; 10:04 auth:token expired; 10:06 db:connection timeout; 10:09 auth:invalid token; 10:12 api:upstream 503; 10:14 db:deadlock detected; 10:17 auth:session hijack attempt; 10:20 db:disk space low"

# ═══════════════════════════════════════════════════════════════════════════════
# BENCHMARK: Leaderboard with Ranking
# Sorts scores, assigns ranks, handles ties, and formats a leaderboard.
# ═══════════════════════════════════════════════════════════════════════════════

- name: bench_liquid_tag_leaderboard
  complexity: 1000
  hint: |
    Builds a leaderboard from player data. Since Liquid can't sort objects
    by a property directly in liquid-tag mode, this uses a manual approach:
    iterates N^2 to find rank by counting how many players have a higher
    score. Tests: nested for loops (O(n^2)), if/elsif, plus, minus,
    forloop.index, size, append chains, and comparison operators.
  template: |
    {%- liquid
      # ════════════════════════════════════════════════════════════════════
      # LEADERBOARD GENERATOR
      # Ranks players by score (higher is better), handles ties.
      # ════════════════════════════════════════════════════════════════════

      assign board = ""

      # For each player, count how many have a strictly higher score = rank - 1
      for player in players
        assign rank = 1
        for other in players
          if other.score > player.score
            assign rank = rank | plus: 1
          endif
        endfor

        # Medal emoji for top 3
        if rank == 1
          assign medal = "[GOLD]"
        elsif rank == 2
          assign medal = "[SILVER]"
        elsif rank == 3
          assign medal = "[BRONZE]"
        else
          assign medal = ""
        endif

        # Win rate
        assign total_games = player.wins | plus: player.losses
        if total_games > 0
          assign win_rate = player.wins | times: 100 | divided_by: total_games
        else
          assign win_rate = 0
        endif

        # Format: "#rank Name - score pts (win_rate%) medal"
        if board != ""
          assign board = board | append: " | "
        endif
        assign board = board | append: "#" | append: rank | append: " " | append: player.name | append: " - " | append: player.score | append: "pts (" | append: win_rate | append: "%)"
        if medal != ""
          assign board = board | append: " " | append: medal
        endif
      endfor

      echo "LEADERBOARD: " | append: board
    -%}
  environment:
    players:
      - { name: "Alice", score: 2850, wins: 142, losses: 58 }
      - { name: "Bob", score: 2650, wins: 120, losses: 80 }
      - { name: "Carol", score: 3100, wins: 155, losses: 45 }
      - { name: "Dave", score: 2850, wins: 138, losses: 62 }
      - { name: "Eve", score: 2400, wins: 100, losses: 100 }
      - { name: "Frank", score: 3100, wins: 160, losses: 40 }
      - { name: "Grace", score: 2750, wins: 130, losses: 70 }
      - { name: "Hank", score: 2200, wins: 85, losses: 115 }
  expected: "LEADERBOARD: #3 Alice - 2850pts (71%) [BRONZE] | #6 Bob - 2650pts (60%) | #1 Carol - 3100pts (77%) [GOLD] | #3 Dave - 2850pts (69%) [BRONZE] | #7 Eve - 2400pts (50%) | #1 Frank - 3100pts (80%) [GOLD] | #5 Grace - 2750pts (65%) | #8 Hank - 2200pts (42%)"
