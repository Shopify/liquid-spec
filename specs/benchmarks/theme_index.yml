---
_metadata:
  hint: Real Shopify Dream theme benchmark — requires shopify_filters feature
  doc: implementers/shopify-theme-filters.md
  required_features:
    - shopify_filters
  data_files:
    - _data/theme_database.yml
specs:
- name: shopify_theme_index_page
  template: |
    <div class="template-index">
      <!-- Hero Banner -->
      <div class="hero">
        <div class="hero__content">
          <h1 class="hero__title">Welcome to {{ shop.name }}</h1>
          <p class="hero__text">Shop our latest collection of premium products</p>
          <a href="/collections/all" class="button button--primary">Shop Now</a>
        </div>
      </div>

      <!-- Featured Collection -->
      <div class="section">
        <div class="container">
          <div class="section__header">
            <h2 class="section__title">Featured Collection</h2>
          </div>
          <div class="product-grid">
            {% for product in collections.frontpage.products limit: 4 %}
              {% include 'product-card' %}
            {% endfor %}
          </div>
          <div class="section__footer">
            <a href="{{ collections.frontpage.url }}" class="button">View All</a>
          </div>
        </div>
      </div>

      <!-- Promotional Banner -->
      <div class="promo-banner">
        <div class="container">
          <div class="promo-banner__content">
            <h2 class="promo-banner__title">Special Offer</h2>
            <p class="promo-banner__text">Use code WELCOME15 for 15% off your first order</p>
            <a href="/collections/sale" class="button button--secondary">Shop Sale</a>
          </div>
        </div>
      </div>

      <!-- Latest Products -->
      <div class="section">
        <div class="container">
          <div class="section__header">
            <h2 class="section__title">New Arrivals</h2>
          </div>
          <div class="product-grid">
            {% for product in collections.all.products limit: 8 %}
              {% include 'product-card' %}
            {% endfor %}
          </div>
        </div>
      </div>

      <!-- Testimonials -->
      <div class="section section--alt">
        <div class="container">
          <div class="section__header">
            <h2 class="section__title">What Our Customers Say</h2>
          </div>
          <div class="testimonials">
            <div class="testimonial">
              <div class="testimonial__content">
                <p>"Amazing quality products and fast shipping. Will definitely shop here again!"</p>
              </div>
              <div class="testimonial__author">- Sarah M.</div>
            </div>
            <div class="testimonial">
              <div class="testimonial__content">
                <p>"The customer service was outstanding. They went above and beyond to help me."</p>
              </div>
              <div class="testimonial__author">- John D.</div>
            </div>
            <div class="testimonial">
              <div class="testimonial__content">
                <p>"Best online shopping experience I've ever had. The products exceeded my expectations."</p>
              </div>
              <div class="testimonial__author">- Emily R.</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  filesystem:
    product-card.liquid: |
      {% comment %}
        Reusable product card for collection grids and featured products
      {% endcomment %}
      <div class="product-card">
        <a href="{{ product.url }}" class="product-card__link">
          <div class="product-card__image">
            <img src="{{ product.featured_image | product_img_url: 'medium' }}" alt="{{ product.title | escape }}">
          </div>
          <div class="product-card__info">
            <h3 class="product-card__title">{{ product.title }}</h3>
            <div class="product-card__price">
              {% if product.compare_at_price > product.price %}
                <span class="product-card__price--sale">{{ product.price | money }}</span>
                <span class="product-card__price--compare">{{ product.compare_at_price | money }}</span>
              {% else %}
                <span class="product-card__price--regular">{{ product.price | money }}</span>
              {% endif %}
            </div>
          </div>
        </a>
        <form action="/cart/add" method="post" class="product-card__form">
          <input type="hidden" name="id" value="{{ product.variants.first.id }}">
          <button type="submit" class="product-card__button">Add to Cart</button>
        </form>
      </div>
  environment: {}
  expected_pattern: "(?m)template-index.*Welcome to.*Featured Collection.*product-card.*\\$.*New Arrivals.*product-card.*Testimonials"
