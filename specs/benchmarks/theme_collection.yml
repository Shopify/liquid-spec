---
_metadata:
  hint: Real Shopify Dream theme benchmark — requires shopify_filters feature
  doc: implementers/shopify-theme-filters.md
  required_features:
    - shopify_filters
  data_files:
    - _data/theme_database.yml
specs:
- name: shopify_theme_collection_page
  template: |
    <div class="template-collection">
      <div class="collection-header">
        <div class="container">
          <h1 class="collection-header__title">{{ collection.title }}</h1>
          {% if collection.description != blank %}
            <div class="collection-header__description">
              {{ collection.description }}
            </div>
          {% endif %}
        </div>
      </div>

      <div class="container">
        <div class="collection-toolbar">
          <div class="collection-toolbar__count">
            {% if collection.products_count > 0 %}
              {{ collection.products_count }} products
            {% else %}
              No products found
            {% endif %}
          </div>
          <div class="collection-toolbar__sort">
            <label for="SortBy">Sort by:</label>
            <select id="SortBy" class="collection-toolbar__select">
              <option value="manual">Featured</option>
              <option value="best-selling">Best Selling</option>
              <option value="title-ascending">Alphabetically, A-Z</option>
              <option value="title-descending">Alphabetically, Z-A</option>
              <option value="price-ascending">Price, low to high</option>
              <option value="price-descending">Price, high to low</option>
              <option value="created-descending">Date, new to old</option>
              <option value="created-ascending">Date, old to new</option>
            </select>
          </div>
        </div>

        <div class="collection-products">
          {% assign _products = collection.products %}
          {% paginate _products by 12 %}
            {% if _products.size > 0 %}
              <div class="product-grid">
                {% for product in _products %}
                  {% include 'product-card' %}
                {% endfor %}
              </div>
            {% else %}
              <div class="collection-empty">
                <p>No products found in this collection</p>
              </div>
            {% endif %}

            {% if paginate.pages > 1 %}
              <div class="pagination">
                {{ paginate | default_pagination }}
              </div>
            {% endif %}
          {% endpaginate %}
        </div>
      </div>
    </div>
  filesystem:
    product-card.liquid: |
      {% comment %}
        Reusable product card for collection grids and featured products
      {% endcomment %}
      <div class="product-card">
        <a href="{{ product.url }}" class="product-card__link">
          <div class="product-card__image">
            <img src="{{ product.featured_image | product_img_url: 'medium' }}" alt="{{ product.title | escape }}">
          </div>
          <div class="product-card__info">
            <h3 class="product-card__title">{{ product.title }}</h3>
            <div class="product-card__price">
              {% if product.compare_at_price > product.price %}
                <span class="product-card__price--sale">{{ product.price | money }}</span>
                <span class="product-card__price--compare">{{ product.compare_at_price | money }}</span>
              {% else %}
                <span class="product-card__price--regular">{{ product.price | money }}</span>
              {% endif %}
            </div>
          </div>
        </a>
        <form action="/cart/add" method="post" class="product-card__form">
          <input type="hidden" name="id" value="{{ product.variants.first.id }}">
          <button type="submit" class="product-card__button">Add to Cart</button>
        </form>
      </div>
